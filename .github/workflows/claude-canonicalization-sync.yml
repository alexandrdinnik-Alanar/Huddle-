name: Claude canonicalization sync

on:
  push:
    branches:
      - import/claude-design-corpus-2026-07
    paths:
      - scripts/install-claude-canonicalization-inventories.sh
      - .github/workflows/claude-canonicalization-sync.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-inventories:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          lfs: false

      - name: Generate canonicalization inventories
        shell: bash
        run: bash scripts/install-claude-canonicalization-inventories.sh

      - name: Verify generated files
        shell: bash
        run: |
          test "$(wc -l < docs/01-product/claude-prototype-inventory.csv)" -eq 316
          test "$(wc -l < docs/01-product/claude-route-canonicalization.csv)" -eq 106
          git diff --check

      - name: Commit generated inventories
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/01-product/claude-prototype-inventory.csv
          git add docs/01-product/claude-route-canonicalization.csv

          if git diff --cached --quiet; then
            echo "Inventories are already current."
            exit 0
          fi

          git commit -m "docs: sync Claude canonicalization inventories"
          git push origin "HEAD:${{ github.ref_name }}"
