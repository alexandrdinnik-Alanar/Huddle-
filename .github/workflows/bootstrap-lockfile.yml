name: Bootstrap pnpm lockfile

on:
  push:
    branches:
      - feat/s0-001-foundation
  pull_request:

permissions:
  contents: write

jobs:
  lockfile:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[lockfile]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          filter: blob:none
          sparse-checkout: |
            package.json
            pnpm-lock.yaml
          sparse-checkout-cone-mode: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --lockfile-only
      - name: Upload generated lockfile
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-lock
          path: pnpm-lock.yaml
          if-no-files-found: error
      - name: Commit generated lockfile
        id: commit_lockfile
        continue-on-error: true
        run: |
          set +e
          {
            echo "event=${{ github.event_name }}"
            echo "head_ref=${{ github.head_ref }}"
            echo "ref_name=${{ github.ref_name }}"
            echo "branch_before=$(git branch --show-current)"
            echo "status_before:"
            git status --short
            git add pnpm-lock.yaml
            echo "add_exit=$?"
            echo "status_after_add:"
            git status --short
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: generate pnpm lockfile [lockfile]"
            echo "commit_exit=$?"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
            echo "push_exit=$?"
          } > commit-debug.txt 2>&1
          cat commit-debug.txt
      - name: Upload commit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lockfile-commit-debug
          path: commit-debug.txt
          if-no-files-found: error
