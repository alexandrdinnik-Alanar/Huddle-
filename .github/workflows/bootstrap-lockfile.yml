name: Bootstrap pnpm lockfile

on:
  push:
    branches:
      - feat/s0-001-foundation
  pull_request:

permissions:
  contents: write

jobs:
  lockfile:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[lockfile]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --lockfile-only
      - name: Upload generated lockfile
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-lock
          path: pnpm-lock.yaml
          if-no-files-found: error
      - name: Commit lockfile on branch push
        if: ${{ github.event_name == 'push' }}
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: generate pnpm lockfile [lockfile]"
          git push
