<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="events" hint-size="100%,64px"></dc-import>
  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="events" hint-size="230px,600px"></dc-import></div>
    <div style="flex:1;min-width:0;max-width:640px;padding:32px 40px 60px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <a href="EventRegistrations.dc.html" style="font-size:13px;color:#9E5A2C;text-decoration:none;font-weight:500;">← Back to event</a>
        <div style="font-size:12px;border:1px solid #DBC9B0;background:#fff;padding:8px 16px;border-radius:18px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:border-color .15s;" style-hover="border-color:#BC7A45;color:#9E5A2C;"><dc-import name="Icon" icon-name="signal" color="#463F37" size="13" hint-size="13,13"></dc-import>Export</div>
      </div>
      <div style="font-family:'Newsreader',serif;font-size:24px;color:#3A342C;margin-top:14px;">Check-in list</div>
      <div style="font-size:13px;color:#7C7062;margin-top:4px;">Kids Yoga Workshop</div>
      <div style="font-size:12px;color:#8A7C6C;display:flex;align-items:center;gap:5px;margin-top:2px;"><dc-import name="Icon" icon-name="clock" color="#A99B89" size="12" hint-size="12,12"></dc-import>Sat, Jun 7, 2026 · 10:00–11:30</div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px;">
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:16px;text-align:center;box-shadow:0 6px 16px rgba(150,110,70,.05);"><div style="font-family:'Newsreader',serif;font-size:24px;color:#3A342C;">42</div><div style="font-size:11px;color:#8A7C6C;">Registered</div></div>
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:16px;text-align:center;box-shadow:0 6px 16px rgba(150,110,70,.05);"><div style="font-family:'Newsreader',serif;font-size:24px;color:#6E7459;">31</div><div style="font-size:11px;color:#8A7C6C;">Checked in</div></div>
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:16px;text-align:center;box-shadow:0 6px 16px rgba(150,110,70,.05);"><div style="font-family:'Newsreader',serif;font-size:24px;color:#BC7A45;">11</div><div style="font-size:11px;color:#8A7C6C;">Remaining</div></div>
      </div>

      <div style="display:flex;gap:10px;margin-top:18px;">
        <div style="flex:1;border:1px solid #DBC9B0;border-radius:12px;padding:11px 14px;font-size:13px;color:#A99B89;background:#fff;display:flex;align-items:center;gap:8px;"><dc-import name="Icon" icon-name="search" color="#A99B89" size="14" hint-size="14,14"></dc-import>Search attendee…</div>
        <div style="border:1px solid #DBC9B0;border-radius:12px;padding:11px 16px;font-size:13px;background:#fff;display:flex;align-items:center;gap:7px;font-weight:500;cursor:pointer;"><dc-import name="Icon" icon-name="filter" color="#463F37" size="14" hint-size="14,14"></dc-import>Filter</div>
      </div>

      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:8px;font-size:11px;color:#A99B89;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:18px;padding:0 8px;">
        <div>Attendee</div><div>Ticket</div><div>Status</div><div>Check-in time</div>
      </div>
      <div style="display:flex;flex-direction:column;background:#fff;border:1px solid #EFE4D4;border-radius:14px;overflow:hidden;margin-top:8px;box-shadow:0 6px 16px rgba(150,110,70,.05);">
        <sc-for list="{{ attendees }}" as="a" hint-placeholder-count="6">
          <a href="AttendeeDetail.dc.html" style="display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:8px;align-items:center;padding:12px 14px;border-bottom:1px solid #F2E9DA;font-size:13px;text-decoration:none;color:#463F37;transition:background .15s;" style-hover="background:#FBF5EC;">
            <div style="display:flex;align-items:center;gap:9px;"><div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,{{ a.c1 }},{{ a.c2 }});flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:12px;">{{ a.initial }}</div><span style="color:#3A342C;font-weight:500;">{{ a.name }}</span></div>
            <div style="color:#7C7062;">{{ a.ticket }}</div>
            <div><span style="font-size:11px;background:{{ a.badgeBg }};color:{{ a.badgeColor }};padding:4px 11px;border-radius:12px;font-weight:600;">{{ a.status }}</span></div>
            <div style="color:#8A7C6C;font-size:12px;">{{ a.time }}</div>
          </a>
        </sc-for>
      </div>

      <a href="QRCheckInScanner.dc.html" style="display:flex;align-items:center;justify-content:center;gap:8px;text-align:center;text-decoration:none;background:#BC7A45;color:#fff;border-radius:24px;padding:14px;font-size:14px;font-weight:600;margin-top:20px;box-shadow:0 12px 26px rgba(188,122,69,.28);" style-hover="background:#A9663A;"><dc-import name="Icon" icon-name="grid" color="#fff" size="15" hint-size="15,15"></dc-import>Scan QR code</a>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const OK = ['#EAEBE1', '#6E7459'], PEND = ['#F2E6D6', '#9E5A2C'];
    const mk = (name, initial, ticket, status, time, sev, c1, c2) => ({ name, initial, ticket, status, time, badgeBg: sev[0], badgeColor: sev[1], c1, c2 });
    return {
      attendees: [
        mk('Emma Anderson', 'E', 'Child', 'Checked in', '09:55', OK, '#C99A6B', '#A9663A'),
        mk('Olivia Hansen', 'O', 'Child', 'Checked in', '09:57', OK, '#D79A62', '#B26A38'),
        mk('Noah Johansen', 'N', 'Child', 'Checked in', '10:01', OK, '#C9A87E', '#A97F4E'),
        mk('Sofia Nilsen', 'S', 'Child', 'Pending', '—', PEND, '#A6AD8E', '#7C8460'),
        mk('Lucas Dahl', 'L', 'Child', 'Pending', '—', PEND, '#9BA184', '#6E7459'),
        mk('Mia Kristensen', 'M', 'Child', 'Pending', '—', PEND, '#B8967A', '#967052'),
      ],
    };
  }
}
</script>
</body>
</html>
