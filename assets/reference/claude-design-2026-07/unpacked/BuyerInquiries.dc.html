<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import></div>
    <div style="flex:1;min-width:0;max-width:560px;padding:32px 40px 60px;">
      <a href="MyListings.dc.html" style="font-size:13px;color:#9E5A2C;text-decoration:none;font-weight:500;">← Back to my listings</a>
      <div style="font-family:'Newsreader',serif;font-size:24px;color:#3A342C;margin-top:14px;">Inquiries</div>
      <div style="font-size:13px;color:#7C7062;margin-top:4px;">Manage messages from interested buyers.</div>

      <div style="display:flex;gap:8px;margin-top:20px;">
        <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
          <div style="font-size:13px;padding:9px 16px;border-radius:20px;background:{{ t.bg }};color:{{ t.color }};font-weight:{{ t.weight }};border:1px solid {{ t.border }};cursor:pointer;">{{ t.label }}</div>
        </sc-for>
      </div>

      <div style="display:flex;flex-direction:column;gap:4px;margin-top:16px;">
        <sc-for list="{{ inquiries }}" as="i" hint-placeholder-count="3">
          <a href="SellerReservationDetail.dc.html" style="display:flex;align-items:flex-start;gap:12px;padding:13px 8px;text-decoration:none;color:#463F37;border-radius:12px;transition:background .15s;" style-hover="background:#fff;">
            <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,{{ i.c1 }},{{ i.c2 }});flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:15px;">
              {{ i.initial }}
              <sc-if value="{{ i.unread }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:#6E7459;border:2px solid #F6F0E8;"></span></sc-if>
            </div>
            <div style="flex:1;min-width:0;"><div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ i.name }}</div><div style="font-size:12px;color:#7C7062;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ i.message }}</div></div>
            <div style="font-size:11px;color:#8A7C6C;flex-shrink:0;">{{ i.time }}</div>
          </a>
        </sc-for>
      </div>

      <div style="display:flex;align-items:center;gap:9px;background:#F2E6D6;border-radius:12px;padding:13px 16px;font-size:12.5px;color:#7C6A56;margin-top:18px;"><dc-import name="Icon" icon-name="sparkle" color="#9E5A2C" size="14" hint-size="14,14"></dc-import>Tip: Respond quickly to increase your chances of selling.</div>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const tabDefs = ['All (3)', 'Unread (1)', 'Archived'];
    const tabs = tabDefs.map((label, i) => ({ label, bg: i === 0 ? '#3A342C' : '#fff', color: i === 0 ? '#F6F0E8' : '#463F37', border: i === 0 ? '#3A342C' : '#DBC9B0', weight: i === 0 ? 600 : 500 }));
    return {
      tabs,
      inquiries: [
        { initial: 'E', name: 'Emma Anderson', message: 'Hi! Is this stroller still available?', time: '10:04', unread: true, c1: '#C99A6B', c2: '#A9663A' },
        { initial: 'M', name: 'Maria Hansen', message: 'Hi, can you tell me more about the condition?', time: 'Yesterday', unread: false, c1: '#9BA184', c2: '#6E7459' },
        { initial: 'D', name: 'David Olsen', message: "I'm interested, is pickup this week possible?", time: 'May 16', unread: false, c1: '#D79A62', c2: '#B26A38' },
      ],
    };
  }
}
</script>
</body>
</html>
