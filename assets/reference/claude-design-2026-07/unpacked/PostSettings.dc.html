<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;min-height:100vh;background:#F6F0E8;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <div style="width:420px;border-radius:20px;background:#fff;box-shadow:0 20px 50px rgba(31,42,36,0.08);padding:24px;">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="PostDetails.dc.html" style="text-decoration:none;color:#7C7062;">←</a>
      <div style="font-size:16px;font-weight:600;">Post Settings</div>
    </div>

    <div style="display:flex;flex-direction:column;margin-top:16px;">
      <sc-for list="{{ items }}" as="i" hint-placeholder-count="7">
        <div style="display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid #EFE4D4;color:{{ i.color }};cursor:pointer;transition:background .15s;" style-hover="background:#FBF5EC;">
          <span style="width:15px;height:15px;display:flex;"><dc-import name="Icon" icon-name="{{ i.icon }}" color="{{ i.color }}" size="15" hint-size="15,15"></dc-import></span>
          <span style="flex:1;font-size:13px;">{{ i.label }}</span>
          <sc-if value="{{ i.value }}" hint-placeholder-val="{{ false }}"><span style="font-size:12px;color:#8A7C6C;">{{ i.value }} ›</span></sc-if>
          <sc-if value="{{ i.toggle !== undefined }}" hint-placeholder-val="{{ false }}">
            <div style="width:36px;height:20px;border-radius:11px;background:{{ i.toggleBg }};position:relative;">
              <div style="width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;left:{{ i.dot }};"></div>
            </div>
          </sc-if>
        </div>
      </sc-for>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      items: [
        { icon: 'edit', label: 'Edit Post', color: '#463F37' },
        { icon: 'lock', label: 'Edit Privacy', color: '#463F37', value: 'Public' },
        { icon: 'chat', label: 'Turn Off Comments', color: '#463F37', toggle: false, toggleBg: '#DBC9B0', dot: '3px' },
        { icon: 'pin-top', label: 'Pin to Top', color: '#463F37' },
        { icon: 'bookmark', label: 'Save Post', color: '#463F37', toggle: true, toggleBg: '#3A342C', dot: '19px' },
        { icon: 'image', label: 'Add to Album', color: '#463F37' },
        { icon: 'trash', label: 'Delete Post', color: '#B0462F' },
      ],
    };
  }
}

</script>
</body>
</html>
