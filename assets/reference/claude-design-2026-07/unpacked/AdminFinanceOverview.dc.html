<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="display:flex;font-family:'Hanken Grotesk',sans-serif;color:#463F37;background:#F6F0E8;min-height:100vh;">
  <dc-import name="AdminSidebar" active="finance" hint-size="220px,100%"></dc-import>
  <div style="flex:1;padding:32px 40px;">
    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Admin</div>
    <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;">Finance overview</div>
    <div style="font-size:13px;color:#8A7C6C;margin-top:4px;">Platform revenue &amp; payout health — last 30 days</div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px;">
      <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
          <div style="font-size:11.5px;color:#8A7C6C;">{{ s.label }}</div>
          <div style="font-family:'Newsreader',serif;font-size:24px;margin-top:6px;color:#3A342C;">{{ s.value }}</div>
          <div style="font-size:11px;margin-top:4px;color:#6E7459;font-weight:600;">{{ s.delta }}</div>
        </div>
      </sc-for>
    </div>

    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-top:22px;">
      <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:22px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
        <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;">Revenue by channel</div>
        <div style="display:flex;flex-direction:column;gap:12px;margin-top:16px;">
          <sc-for list="{{ channels }}" as="c" hint-placeholder-count="4">
            <div style="display:flex;align-items:center;gap:10px;font-size:12.5px;">
              <span style="width:100px;color:#7C7062;">{{ c.label }}</span>
              <div style="flex:1;height:8px;background:#EFE4D4;border-radius:4px;overflow:hidden;"><div style="width:{{ c.pct }}%;height:100%;background:linear-gradient(90deg,#C68C57,#9E5A2C);"></div></div>
              <span style="width:70px;text-align:right;font-weight:600;color:#463F37;">{{ c.value }}</span>
            </div>
          </sc-for>
        </div>
      </div>
      <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:22px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
        <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;">Quick links</div>
        <sc-for list="{{ links }}" as="l" hint-placeholder-count="4">
          <a href="{{ l.href }}" style="display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid #F1E9DC;text-decoration:none;color:#463F37;border-radius:10px;transition:background .15s;" style-hover="background:#FBF5EC;">
            <span style="display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;"><dc-import name="Icon" icon-name="{{ l.icon }}" color="#BC7A45" size="14" hint-size="14,14"></dc-import>{{ l.label }}</span>
            <span style="font-size:12px;color:#A99B89;">→</span>
          </a>
        </sc-for>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      stats: [
        { label: 'Gross revenue', value: '842K NOK', delta: '+12% vs last month' },
        { label: 'Platform commission', value: '84K NOK', delta: '+9% vs last month' },
        { label: 'Pending payouts', value: '38K NOK', delta: '12 sellers' },
        { label: 'Open disputes', value: '4', delta: '2 resolved this week' },
      ],
      channels: [
        { label: 'Marketplace', pct: 58, value: '488K NOK' },
        { label: 'Events', pct: 22, value: '185K NOK' },
        { label: 'Services', pct: 14, value: '118K NOK' },
        { label: 'Activities', pct: 6, value: '51K NOK' },
      ],
      links: [
        { icon: 'coin', label: 'Commissions', href: 'AdminFinanceCommissions.dc.html' },
        { icon: 'refresh', label: 'Refunds', href: 'AdminFinanceRefunds.dc.html' },
        { icon: 'flag', label: 'Disputes', href: 'AdminFinanceDisputes.dc.html' },
        { icon: 'bag', label: 'Payouts', href: 'AdminFinancePayouts.dc.html' },
      ],
    };
  }
}
</script>
</body>
</html>
