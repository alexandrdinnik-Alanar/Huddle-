<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="events" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="events" hint-size="230px,600px"></dc-import>
    <div style="max-width:420px;padding:32px 40px;">
      <a href="MyEventsList.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to My Events</a>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
        <div style="font-family:'Newsreader',serif;font-size:22px;">Your Ticket</div>
        <div style="font-size:11px;background:#EAEBE1;color:#6E7459;padding:5px 12px;border-radius:12px;">Confirmed</div>
      </div>

      <div style="display:flex;gap:12px;background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:14px;margin-top:16px;">
        <div style="width:56px;height:56px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
        <div>
          <div style="font-size:13px;font-weight:600;">Kids Yoga Workshop</div>
          <div style="font-size:11px;color:#7C7062;">Sat, Jun 7, 2025<br/>10:00 AM – 11:30 AM</div>
          <div style="font-size:11px;color:#7C7062;">Grünerløkka Community Center<br/>Oslo, Norway</div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">
        <sc-for list="{{ info }}" as="i" hint-placeholder-count="4">
          <div style="display:flex;justify-content:space-between;font-size:13px;">
            <span style="color:#8A7C6C;">{{ i.label }}</span><span style="font-weight:600;">{{ i.value }}</span>
          </div>
        </sc-for>
      </div>

      <div style="background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:24px;margin-top:16px;text-align:center;">
        <div style="width:150px;height:150px;background:repeating-conic-gradient(#463F37 0deg 8deg,#fff 8deg 16deg);margin:0 auto;border-radius:6px;"></div>
        <div style="font-size:11px;color:#8A7C6C;margin-top:10px;">Show this QR code at the check-in desk to arrive at the event.</div>
      </div>

      <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:16px;"> Add to Wallet</div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      info: [
        { label: 'Ticket Type', value: '2 × Child' },
        { label: 'Name', value: 'Emma Anderson' },
        { label: 'Order Number', value: '#EVT-2025-00048' },
        { label: 'Ticket ID', value: 'TCK-3847-2348' },
      ],
    };
  }
}

</script>
</body>
</html>
