<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import>
    <div style="max-width:480px;padding:32px 40px;">
      <a href="SellerReservationDetail.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to Reservation</a>
      <div style="font-family:'Newsreader',serif;font-size:22px;margin-top:14px;">Confirm Pickup</div>
      <div style="font-size:13px;color:#7C7062;margin-top:4px;">Confirm that the item has been picked up.</div>

      <div style="display:flex;align-items:center;gap:10px;background:#EAEBE1;border-radius:12px;padding:14px;margin-top:18px;">
        <div style="width:30px;height:30px;border-radius:50%;background:#6E7459;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;">✓</div>
        <div>
          <div style="font-size:13px;font-weight:600;color:#6E7459;">Pickup Confirmed</div>
          <div style="font-size:11px;color:#3F6B54;">The reservation is now completed.</div>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:12px;margin-top:20px;">
        <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:600;">Emma Anderson</div>
          <div style="font-size:11px;color:#8A7C6C;">Member since Jan 2024</div>
        </div>
        <div style="border:1px solid #DBC9B0;background:#fff;border-radius:18px;padding:8px 14px;font-size:12px;"> Message</div>
      </div>

      <div style="font-size:12px;color:#8A7C6C;margin-top:20px;">Item</div>
      <div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:14px;margin-top:8px;">
        <div style="width:48px;height:48px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
        <div>
          <div style="font-size:13px;font-weight:600;">Stokke Trailz Stroller</div>
          <div style="font-size:12px;color:#7C7062;">NOK 2,500</div>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:16px;">
        <span style="color:#8A7C6C;">Pickup Date</span><span style="font-weight:600;">May 28, 2025</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:8px;">
        <span style="color:#8A7C6C;">Pickup Location</span><span style="font-weight:600;">Grünerløkka 15, 0550 Oslo</span>
      </div>

      <a href="MyListings.dc.html" style="display:block;text-align:center;text-decoration:none;background:#3A342C;color:#fff;border-radius:22px;padding:13px;font-size:14px;font-weight:600;margin-top:22px;">Go to My Listings</a>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() { return {}; }
}

</script>
</body>
</html>
