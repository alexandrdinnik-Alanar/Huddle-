<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px 60px;">
    <a href="MyGroupsList.dc.html" style="font-size:13px;color:#9E5A2C;text-decoration:none;font-weight:500;">← Back to groups</a>

    <div style="display:flex;align-items:center;gap:14px;margin-top:16px;">
      <div style="width:56px;height:56px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,#9BA184,#6E7459);display:flex;align-items:center;justify-content:center;"><dc-import name="Icon" icon-name="people" color="#fff" size="24" hint-size="24,24"></dc-import></div>
      <div style="flex:1;"><div style="font-family:'Newsreader',serif;font-size:20px;color:#3A342C;">Oslo Runners Club</div><div style="font-size:12px;color:#8A7C6C;">Public group · 12 members</div></div>
      <div style="font-size:12px;border:1px solid #6E7459;color:#6E7459;background:#EAEBE1;padding:7px 16px;border-radius:18px;font-weight:600;">Joined</div>
    </div>

    <div style="display:flex;gap:8px;margin-top:20px;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="5">
        <div style="font-size:13px;padding:9px 16px;border-radius:20px;background:{{ t.bg }};color:{{ t.color }};font-weight:{{ t.weight }};border:1px solid {{ t.border }};cursor:pointer;">{{ t.label }}</div>
      </sc-for>
    </div>

    <div style="font-family:'Newsreader',serif;font-size:20px;color:#3A342C;margin-top:24px;">Group settings</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px;">
      <sc-for list="{{ settings }}" as="s" hint-placeholder-count="6">
        <div style="display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:14px 16px;box-shadow:0 6px 16px rgba(150,110,70,.05);cursor:pointer;transition:transform .16s;" style-hover="transform:translateY(-2px);">
          <div style="width:38px;height:38px;border-radius:10px;background:#F2E6D6;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="{{ s.icon }}" color="#BC7A45" size="17" hint-size="17,17"></dc-import></div>
          <div style="flex:1;"><div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ s.title }}</div><div style="font-size:11.5px;color:#8A7C6C;margin-top:1px;">{{ s.desc }}</div></div>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#A99B89" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
        </div>
      </sc-for>
    </div>

    <div style="text-align:center;border:1px solid #E5B8A8;color:#B0462F;background:#fff;border-radius:24px;padding:13px;font-size:13.5px;font-weight:600;margin-top:22px;cursor:pointer;transition:background .15s;" style-hover="background:#F7E0D6;">Delete group</div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const tabDefs = ['Feed', 'Members', 'Events', 'About', 'Settings'];
    const tabs = tabDefs.map((label, i) => ({
      label, bg: i === 4 ? '#3A342C' : '#fff', color: i === 4 ? '#F6F0E8' : '#463F37', border: i === 4 ? '#3A342C' : '#DBC9B0', weight: i === 4 ? 600 : 500,
    }));
    return {
      tabs,
      settings: [
        { icon: 'edit', title: 'Edit group info', desc: 'Update name, description, category' },
        { icon: 'lock', title: 'Privacy settings', desc: 'Manage group privacy and access' },
        { icon: 'people', title: 'Membership settings', desc: 'Configure how people can join' },
        { icon: 'user', title: 'Manage members', desc: 'Add or remove members and admins' },
        { icon: 'book', title: 'Group rules', desc: 'Manage and update group rules' },
        { icon: 'mail', title: 'Notifications', desc: 'Configure group notification settings' },
      ],
    };
  }
}
</script>
</body>
</html>
