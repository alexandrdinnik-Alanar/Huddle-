<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="SiteHeader" active="services" breadcrumb="Services" hint-size="100%,150px"></dc-import>

  <div style="max-width:960px;margin:0 auto;padding:32px 40px 60px;">
    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Trusted local experts</div>
    <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;margin-bottom:18px;">Browse services</div>

    <div style="display:flex;align-items:center;gap:9px;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:12px 18px;font-size:13.5px;color:#A99B89;box-shadow:0 8px 20px rgba(150,110,70,.06);"><dc-import name="Icon" icon-name="search" color="#A99B89" size="15" hint-size="15,15"></dc-import>Search services…</div>

    <div style="display:flex;gap:8px;margin-top:16px;">
      <sc-for list="{{ filters }}" as="f" hint-placeholder-count="4">
        <div style="font-size:13px;padding:9px 17px;border-radius:20px;background:{{ f.bg }};color:{{ f.color }};font-weight:{{ f.weight }};border:1px solid {{ f.border }};cursor:pointer;">{{ f.label }}</div>
      </sc-for>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;margin-top:20px;">
      <sc-for list="{{ providers }}" as="p" hint-placeholder-count="4">
        <a href="ServiceDetails.dc.html" style="display:flex;gap:16px;background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:16px;text-decoration:none;color:#463F37;align-items:center;box-shadow:0 8px 20px rgba(150,110,70,.06);transition:transform .16s,box-shadow .16s;" style-hover="transform:translateY(-3px);box-shadow:0 16px 34px rgba(150,110,70,.13);">
          <div style="width:68px;height:68px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,{{ p.c1 }},{{ p.c2 }});display:flex;align-items:center;justify-content:center;"><dc-import name="Icon" icon-name="{{ p.icon }}" color="#fff" size="26" hint-size="26,26"></dc-import></div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14.5px;font-weight:600;color:#3A342C;">{{ p.name }}</div>
            <div style="font-size:12px;color:#8A7C6C;margin-top:1px;">{{ p.category }}</div>
            <div style="font-size:12px;color:#7C7062;margin-top:3px;display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="star" color="#BC7A45" size="12" hint-size="12,12"></dc-import>{{ p.rating }} ({{ p.reviews }}) · {{ p.distance }}</div>
            <div style="font-size:11px;color:#A99B89;margin-top:2px;">{{ p.city }}</div>
          </div>
          <div style="width:34px;height:34px;border-radius:50%;background:#F2E6D6;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="heart" color="#BC7A45" size="14" hint-size="14,14"></dc-import></div>
        </a>
      </sc-for>
    </div>
  </div>

  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      filters: [
        { label: 'All', bg: '#3A342C', color: '#F6F0E8', border: '#3A342C', weight: 600 },
        { label: 'Top rated', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'Nearby', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'Open now', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
      ],
      providers: [
        { name: 'Bright Minds Center', category: 'Family Counseling', rating: '4.8', reviews: 128, distance: '1.2 km', city: 'Oslo, Norway', icon: 'leaf', c1: '#9BA184', c2: '#6E7459' },
        { name: 'Oslo Children Clinic', category: 'Pediatric Care', rating: '4.9', reviews: 96, distance: '1.6 km', city: 'Oslo, Norway', icon: 'heart', c1: '#D79A62', c2: '#B26A38' },
        { name: 'Active Life Physiotherapy', category: 'Physiotherapy', rating: '4.7', reviews: 74, distance: '2.1 km', city: 'Oslo, Norway', icon: 'pulse', c1: '#C9A87E', c2: '#A97F4E' },
        { name: 'Happy Paws Vet', category: 'Veterinary Care', rating: '4.6', reviews: 64, distance: '2.4 km', city: 'Oslo, Norway', icon: 'check', c1: '#A6AD8E', c2: '#7C8460' },
      ],
    };
  }
}
</script>
</body>
</html>
