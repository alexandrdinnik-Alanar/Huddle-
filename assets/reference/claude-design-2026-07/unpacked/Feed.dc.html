<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px 60px;">
    <div style="display:flex;gap:8px;">
      <sc-for list="{{ filters }}" as="f" hint-placeholder-count="4">
        <div style="font-size:13px;padding:8px 18px;border-radius:20px;background:{{ f.bg }};color:{{ f.color }};font-weight:{{ f.weight }};border:1px solid {{ f.border }};cursor:pointer;transition:border-color .15s;" style-hover="border-color:#BC7A45;">{{ f.label }}</div>
      </sc-for>
    </div>

    <a href="CreatePost.dc.html" style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:15px;margin-top:18px;text-decoration:none;color:#A99B89;box-shadow:0 8px 20px rgba(150,110,70,.06);transition:border-color .15s;" style-hover="border-color:#BC7A45;">
      <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#C99A6B,#A9663A);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:15px;">E</div>
      <span style="font-size:13.5px;">What's on your mind?</span>
    </a>

    <div style="display:flex;flex-direction:column;gap:14px;margin-top:18px;">
      <sc-for list="{{ posts }}" as="p" hint-placeholder-count="3">
        <a href="PostDetails.dc.html" style="text-decoration:none;color:#463F37;background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:16px;display:block;box-shadow:0 8px 20px rgba(150,110,70,.06);transition:transform .16s;" style-hover="transform:translateY(-3px);">
          <div style="display:flex;align-items:center;gap:11px;">
            <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,{{ p.c1 }},{{ p.c2 }});flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:15px;">{{ p.initial }}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ p.name }}</div>
              <div style="font-size:11px;color:#8A7C6C;">{{ p.time }} · {{ p.location }}</div>
            </div>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="#A99B89"><circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle></svg>
          </div>
          <div style="font-size:13.5px;margin-top:11px;line-height:1.5;">{{ p.text }}</div>
          <div style="height:190px;border-radius:12px;overflow:hidden;margin-top:11px;"><img src="{{ p.img }}" alt="{{ p.name }}" style="width:100%;height:100%;object-fit:cover;"></div>
          <div style="display:flex;align-items:center;gap:20px;font-size:12.5px;color:#8A7C6C;margin-top:12px;padding-top:12px;border-top:1px solid #F2E9DA;">
            <span style="display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="heart" color="#BC7A45" size="13" hint-size="13,13"></dc-import>{{ p.likes }}</span>
            <span style="display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="chat" color="#8A7C6C" size="13" hint-size="13,13"></dc-import>{{ p.comments }} comments</span>
            <span style="display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="signal" color="#8A7C6C" size="13" hint-size="13,13"></dc-import>Share</span>
          </div>
        </a>
      </sc-for>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      filters: [
        { label: 'For You', bg: '#3A342C', color: '#F6F0E8', border: '#3A342C', weight: 600 },
        { label: 'Following', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'Groups', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'Events', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
      ],
      posts: [
        { initial: 'E', name: 'Emma Andersen', time: '2h ago', location: 'Oslo, Norway', text: 'What a beautiful day for a family picnic in Frogner Park!', likes: 28, comments: 6, c1: '#C99A6B', c2: '#A9663A', img: 'https://d8j0ntlcm91z4.cloudfront.net/user_3FvCn7uBV4p4gvzj7gN7FkzdUf7/hf_20260721_144038_d8a1e095-5bd0-45c0-9f81-2b7c6fc54f21.png' },
        { initial: 'M', name: 'Martin Larsen', time: '5h ago', location: 'Nordmarka', text: 'Sunset hike with the kids. Nature never fails to amaze us.', likes: 41, comments: 9, c1: '#9BA184', c2: '#6E7459', img: 'https://d8j0ntlcm91z4.cloudfront.net/user_3FvCn7uBV4p4gvzj7gN7FkzdUf7/hf_20260721_144805_dce86af6-1a6d-4419-aa61-d78515166cdc.png' },
        { initial: 'J', name: 'Julie Hansen', time: '1d ago', location: 'Oslo, Norway', text: 'Homemade pizza night! The kids loved it.', likes: 33, comments: 5, c1: '#D79A62', c2: '#B26A38', img: 'https://d8j0ntlcm91z4.cloudfront.net/user_3FvCn7uBV4p4gvzj7gN7FkzdUf7/hf_20260721_144807_5c99be7a-9a8e-4128-8eff-c56d61154cfd.png' },
      ],
    };
  }
}
</script>
</body>
</html>
