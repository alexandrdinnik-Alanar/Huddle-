<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;display:flex;align-items:flex-start;min-height:100vh;">
  <dc-import name="AdminSidebar" active="analytics" hint-size="220px,100vh"></dc-import>
  <div style="flex:1;min-width:0;padding:32px 40px;">
    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Admin</div>
    <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;">Platform analytics</div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px;">
      <sc-for list="{{ kpis }}" as="k" hint-placeholder-count="4">
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
          <div style="font-size:11.5px;color:#8A7C6C;">{{ k.label }}</div>
          <div style="font-family:'Newsreader',serif;font-size:26px;color:#3A342C;margin-top:4px;">{{ k.value }}</div>
          <div style="font-size:11px;color:#6E7459;font-weight:600;margin-top:4px;">↑ {{ k.change }} vs last month</div>
        </div>
      </sc-for>
    </div>

    <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-top:20px;align-items:start;">
      <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:22px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
        <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;margin-bottom:16px;">Active users over time</div>
        <div style="display:flex;align-items:flex-end;gap:8px;height:150px;">
          <sc-for list="{{ chart }}" as="b" hint-placeholder-count="12">
            <div style="flex:1;height:{{ b.h }}%;background:linear-gradient(180deg,#C68C57,#9E5A2C);border-radius:5px 5px 0 0;"></div>
          </sc-for>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#A99B89;margin-top:8px;">
          <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span><span>Jul</span><span>Aug</span><span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span>
        </div>
      </div>
      <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:22px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
        <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;margin-bottom:14px;">Top categories</div>
        <sc-for list="{{ categories }}" as="c" hint-placeholder-count="5">
          <div style="display:flex;align-items:center;gap:10px;font-size:12px;margin-bottom:11px;"><span style="width:88px;color:#8A7C6C;">{{ c.label }}</span><div style="flex:1;height:7px;background:#EFE4D4;border-radius:4px;overflow:hidden;"><div style="width:{{ c.pct }}%;height:100%;background:linear-gradient(90deg,#C68C57,#9E5A2C);"></div></div><span style="width:32px;text-align:right;font-weight:600;color:#463F37;">{{ c.pct }}%</span></div>
        </sc-for>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;">
      <sc-for list="{{ breakdown }}" as="b" hint-placeholder-count="3">
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:20px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
          <div style="font-family:'Newsreader',serif;font-size:18px;color:#3A342C;">{{ b.title }}</div>
          <div style="display:flex;flex-direction:column;gap:9px;margin-top:12px;">
            <sc-for list="{{ b.rows }}" as="r" hint-placeholder-count="4">
              <div style="display:flex;justify-content:space-between;font-size:12.5px;"><span style="color:#7C7062;">{{ r.label }}</span><span style="font-weight:600;color:#3A342C;">{{ r.value }}</span></div>
            </sc-for>
          </div>
        </div>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      kpis: [
        { label: 'Monthly active families', value: '12,540', change: '8.2%' },
        { label: 'GMV (marketplace)', value: '1.84M NOK', change: '11.4%' },
        { label: 'Events published', value: '312', change: '5.6%' },
        { label: 'Avg. session time', value: '6m 42s', change: '3.1%' },
      ],
      chart: [40, 48, 52, 58, 55, 64, 70, 68, 74, 80, 86, 92].map((h) => ({ h })),
      categories: [
        { label: 'Marketplace', pct: 38 },
        { label: 'Activities', pct: 26 },
        { label: 'Events', pct: 18 },
        { label: 'Community', pct: 12 },
        { label: 'Services', pct: 6 },
      ],
      breakdown: [
        { title: 'By role', rows: [
          { label: 'Parents', value: '10,240' },
          { label: 'Sellers', value: '1,120' },
          { label: 'Organizers', value: '680' },
          { label: 'Experts', value: '340' },
        ]},
        { title: 'By city', rows: [
          { label: 'Oslo', value: '6,420' },
          { label: 'Bergen', value: '2,180' },
          { label: 'Trondheim', value: '1,860' },
          { label: 'Stavanger', value: '1,240' },
        ]},
        { title: 'Trust & safety', rows: [
          { label: 'Reports resolved (30d)', value: '142' },
          { label: 'Avg. resolution time', value: '18h' },
          { label: 'Appeals overturned', value: '9%' },
          { label: 'Verified experts', value: '150' },
        ]},
      ],
    };
  }
}
</script>
</body>
</html>
