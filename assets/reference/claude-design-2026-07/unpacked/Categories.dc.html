<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>

  <div style="max-width:760px;margin:0 auto;padding:36px 40px 60px;">
    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Community</div>
    <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;">Categories</div>
    <div style="font-size:13px;color:#7C7062;margin-top:6px;">Explore what other families are talking about.</div>

    <div style="display:flex;flex-direction:column;gap:10px;margin-top:22px;">
      <sc-for list="{{ categories }}" as="c" hint-placeholder-count="8">
        <a href="SearchResults.dc.html" style="display:flex;align-items:center;gap:16px;background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:16px;text-decoration:none;color:#463F37;box-shadow:0 8px 20px rgba(150,110,70,.06);transition:transform .16s,box-shadow .16s;" style-hover="transform:translateY(-3px);box-shadow:0 16px 34px rgba(150,110,70,.13);">
          <div style="width:44px;height:44px;border-radius:12px;background:{{ c.bg }};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="{{ c.icon }}" color="{{ c.color }}" size="19" hint-size="19,19"></dc-import></div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:600;color:#3A342C;">{{ c.name }}</div>
            <div style="font-size:11.5px;color:#8A7C6C;margin-top:2px;">{{ c.count }} posts</div>
          </div>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#A99B89" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M9 6l6 6-6 6"></path></svg>
        </a>
      </sc-for>
    </div>
  </div>

  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const B = [['#F2E6D6', '#BC7A45'], ['#EAEBE1', '#6E7459']];
    const c = (icon, name, count, i) => ({ icon, name, count, bg: B[i % 2][0], color: B[i % 2][1] });
    return {
      categories: [
        c('people', 'Family Life', '1.2K', 0),
        c('sparkle', 'Parenting Tips', '987', 1),
        c('heart', 'Health & Wellness', '856', 0),
        c('pin', 'Travel & Adventure', '743', 1),
        c('leaf', 'Food & Recipes', '1.1K', 0),
        c('home', 'Home & Living', '662', 1),
        c('book', 'Education', '534', 0),
        c('calendar', 'Entertainment', '421', 1),
      ],
    };
  }
}
</script>
</body>
</html>
