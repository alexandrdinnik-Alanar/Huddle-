<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="" hint-size="100%,64px"></dc-import>
  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import></div>
    <div style="flex:1;min-width:0;max-width:640px;padding:32px 40px 60px;">
      <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Your account</div>
      <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;">Wallet</div>

      <div style="position:relative;overflow:hidden;background:linear-gradient(140deg,#3A342C,#524734);border-radius:22px;padding:28px 30px;color:#F6F0E8;margin-top:20px;">
        <img src="assets/Huddle_icon_white_transparent.png" alt="" style="position:absolute;right:-24px;bottom:-30px;width:140px;opacity:.1;pointer-events:none;">
        <div style="font-size:11.5px;color:#D8CDB9;">Available balance</div>
        <div style="font-family:'Newsreader',serif;font-size:36px;margin-top:6px;">642 NOK</div>
        <div style="display:flex;gap:10px;margin-top:18px;">
          <div style="background:#BC7A45;color:#fff;border-radius:22px;padding:11px 22px;font-size:12.5px;font-weight:600;cursor:pointer;box-shadow:0 10px 22px rgba(188,122,69,.28);">Withdraw</div>
          <div style="border:1px solid rgba(246,240,232,.5);color:#F6F0E8;border-radius:22px;padding:11px 22px;font-size:12.5px;font-weight:500;cursor:pointer;transition:background .15s;" style-hover="background:rgba(246,240,232,.12);">Add funds</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px;">
        <sc-for list="{{ stats }}" as="s" hint-placeholder-count="3">
          <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:14px;box-shadow:0 6px 16px rgba(150,110,70,.05);">
            <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;">{{ s.value }}</div>
            <div style="font-size:10.5px;color:#8A7C6C;margin-top:2px;">{{ s.label }}</div>
          </div>
        </sc-for>
      </div>

      <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;margin-top:24px;">Recent transactions</div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-top:12px;">
        <sc-for list="{{ transactions }}" as="t" hint-placeholder-count="5">
          <div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:13px 15px;">
            <div style="width:34px;height:34px;border-radius:10px;background:{{ t.bg }};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="{{ t.icon }}" color="{{ t.color }}" size="15" hint-size="15,15"></dc-import></div>
            <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:600;color:#3A342C;">{{ t.title }}</div><div style="font-size:11px;color:#8A7C6C;">{{ t.date }}</div></div>
            <div style="font-size:13.5px;font-weight:700;color:{{ t.amountColor }};">{{ t.amount }}</div>
          </div>
        </sc-for>
      </div>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      stats: [
        { value: '3', label: 'Active sales' },
        { value: '12', label: 'Completed sales' },
        { value: '2', label: 'Pending payouts' },
      ],
      transactions: [
        { icon: 'bag', title: 'Sold: Stokke Tripp Trapp Chair', date: 'Jun 1, 2026', amount: '+1 200 NOK', amountColor: '#6E7459', bg: '#EAEBE1', color: '#6E7459' },
        { icon: 'signal', title: 'Withdrawal to bank', date: 'May 28, 2026', amount: '−800 NOK', amountColor: '#B0462F', bg: '#F7E0D6', color: '#B0462F' },
        { icon: 'bag', title: 'Sold: Zara Baby Jacket', date: 'May 24, 2026', amount: '+300 NOK', amountColor: '#6E7459', bg: '#EAEBE1', color: '#6E7459' },
        { icon: 'calendar', title: 'Refund: Kids Yoga Workshop', date: 'May 20, 2026', amount: '−180 NOK', amountColor: '#B0462F', bg: '#F7E0D6', color: '#B0462F' },
        { icon: 'bag', title: 'Sold: Little Dutch Wooden Train', date: 'May 15, 2026', amount: '+150 NOK', amountColor: '#6E7459', bg: '#EAEBE1', color: '#6E7459' },
      ],
    };
  }
}
</script>
</body>
</html>
