<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="activities" hint-size="100%,64px"></dc-import>
  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="events" hint-size="230px,600px"></dc-import></div>
    <div style="flex:1;min-width:0;max-width:680px;padding:32px 40px 60px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Organizer</div>
          <div style="font-family:'Newsreader',serif;font-size:26px;color:#3A342C;margin-top:4px;">My activities</div>
          <div style="font-size:13px;color:#7C7062;margin-top:4px;">Manage all your activities in one place.</div>
        </div>
        <a href="CreateActivityBasicInfo.dc.html" style="text-decoration:none;background:#BC7A45;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:0 10px 22px rgba(188,122,69,.26);" style-hover="background:#A9663A;">+ Create activity</a>
      </div>

      <div style="display:flex;gap:8px;margin-top:20px;">
        <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
          <div style="font-size:13px;padding:9px 16px;border-radius:20px;background:{{ t.bg }};color:{{ t.color }};font-weight:{{ t.weight }};border:1px solid {{ t.border }};cursor:pointer;">{{ t.label }}</div>
        </sc-for>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;margin-top:18px;">
        <sc-for list="{{ activities }}" as="a" hint-placeholder-count="3">
          <a href="ActivityRegistrations.dc.html" style="display:flex;gap:16px;background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:16px;text-decoration:none;color:#463F37;box-shadow:0 8px 20px rgba(150,110,70,.06);transition:transform .16s;" style-hover="transform:translateY(-3px);">
            <div style="width:64px;height:64px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,{{ a.c1 }},{{ a.c2 }});display:flex;align-items:center;justify-content:center;"><dc-import name="Icon" icon-name="pulse" color="#fff" size="24" hint-size="24,24"></dc-import></div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:600;color:#3A342C;">{{ a.name }}</div>
              <div style="font-size:11.5px;color:#8A7C6C;margin-top:3px;display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="clock" color="#A99B89" size="11" hint-size="11,11"></dc-import>{{ a.date }}</div>
              <div style="font-size:11.5px;color:#8A7C6C;display:flex;align-items:center;gap:5px;margin-top:1px;"><dc-import name="Icon" icon-name="pin" color="#A99B89" size="11" hint-size="11,11"></dc-import>{{ a.location }}</div>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-top:9px;">
                <div style="font-size:10.5px;background:#F2E6D6;color:#9E5A2C;padding:4px 11px;border-radius:12px;font-weight:600;">{{ a.status }}</div>
                <div style="font-size:11px;color:#8A7C6C;">{{ a.registered }}</div>
              </div>
            </div>
          </a>
        </sc-for>
      </div>

      <a href="MyActivitiesList.dc.html" style="display:block;text-align:center;text-decoration:none;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:24px;padding:13px;font-size:13.5px;font-weight:500;margin-top:20px;transition:border-color .15s;" style-hover="border-color:#BC7A45;color:#9E5A2C;">View all activities</a>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const tabDefs = ['Upcoming (3)', 'Past (2)', 'Drafts (1)'];
    const tabs = tabDefs.map((label, i) => ({
      label, bg: i === 0 ? '#3A342C' : '#fff', color: i === 0 ? '#F6F0E8' : '#463F37', border: i === 0 ? '#3A342C' : '#DBC9B0', weight: i === 0 ? 600 : 500,
    }));
    return {
      tabs,
      activities: [
        { name: 'Morning Community Run', date: 'Sun, Jun 8, 2026 · 7:00 AM', location: 'Akerselva Park, Oslo', status: 'Upcoming', registered: '18 / 30 registered', c1: '#9BA184', c2: '#6E7459' },
        { name: 'Sunset Yoga Session', date: 'Tue, Jun 10, 2026 · 7:30 PM', location: 'Tjuvholmen, Oslo', status: 'Upcoming', registered: '12 / 20 registered', c1: '#D79A62', c2: '#B26A38' },
        { name: 'Community Clean-Up Day', date: 'Sat, Jun 14, 2026 · 10:00 AM', location: 'Gamlebyen, Oslo', status: 'Upcoming', registered: '25 / 50 registered', c1: '#C9A87E', c2: '#A97F4E' },
      ],
    };
  }
}
</script>
</body>
</html>
