<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="" hint-size="100%,64px"></dc-import>
  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="PartnerSidebar" active="overview" hint-size="230px,600px"></dc-import></div>
    <div style="flex:1;min-width:0;max-width:900px;padding:32px 40px 60px;">
      <div style="font-family:'Newsreader',serif;font-size:27px;color:#3A342C;">Welcome, BabyShop Norway</div>
      <div style="font-size:13px;color:#7C7062;margin-top:4px;">Your partner application is under review.</div>

      <div style="background:#F2E6D6;border-radius:14px;padding:16px 18px;margin-top:20px;display:flex;align-items:center;gap:12px;">
        <div style="width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="clock" color="#BC7A45" size="16" hint-size="16,16"></dc-import></div>
        <div style="font-size:13px;color:#7C6A56;">We'll review your application and get back to you within 2–3 business days.</div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px;">
        <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
          <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
            <div style="font-size:11.5px;color:#8A7C6C;">{{ s.label }}</div>
            <div style="font-family:'Newsreader',serif;font-size:23px;margin-top:5px;color:#3A342C;">{{ s.value }}</div>
          </div>
        </sc-for>
      </div>

      <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;margin-top:26px;">Setup progress</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">
        <sc-for list="{{ setupSteps }}" as="st" hint-placeholder-count="5">
          <div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:14px 16px;box-shadow:0 6px 16px rgba(150,110,70,.05);">
            <div style="width:26px;height:26px;border-radius:50%;background:#EAEBE1;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="check" color="#6E7459" size="13" hint-size="13,13"></dc-import></div>
            <div style="flex:1;font-size:13px;font-weight:600;color:#3A342C;">{{ st }}</div>
          </div>
        </sc-for>
      </div>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      stats: [
        { label: 'Products live', value: '152' },
        { label: 'Pending review', value: '28' },
        { label: 'Orders this month', value: '64' },
        { label: 'Revenue', value: 'NOK 48 200' },
      ],
      setupSteps: [
        'Business information submitted',
        'Business verified',
        'Store profile created',
        'Product feed connected',
        'Partner agreement accepted',
      ],
    };
  }
}
</script>
</body>
</html>
