<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="events" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="events" hint-size="230px,600px"></dc-import>
    <div style="max-width:600px;padding:32px 40px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <a href="EventRegistrations.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to Event</a>
        <div style="font-size:12px;border:1px solid #DBC9B0;background:#fff;padding:8px 14px;border-radius:16px;">Export</div>
      </div>
      <div style="font-family:'Newsreader',serif;font-size:22px;margin-top:14px;">Check-in List</div>
      <div style="font-size:13px;color:#7C7062;margin-top:4px;">Kids Yoga Workshop</div>
      <div style="font-size:12px;color:#8A7C6C;">Sat, Jun 7, 2025 · 10:00 AM – 11:30 AM</div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px;">
        <div style="background:#fff;border:1px solid #DBC9B0;border-radius:12px;padding:14px;text-align:center;">
          <div style="font-family:'Newsreader',serif;font-size:22px;">42</div><div style="font-size:11px;color:#8A7C6C;">Registered</div>
        </div>
        <div style="background:#fff;border:1px solid #DBC9B0;border-radius:12px;padding:14px;text-align:center;">
          <div style="font-family:'Newsreader',serif;font-size:22px;color:#6E7459;">31</div><div style="font-size:11px;color:#8A7C6C;">Checked In</div>
        </div>
        <div style="background:#fff;border:1px solid #DBC9B0;border-radius:12px;padding:14px;text-align:center;">
          <div style="font-family:'Newsreader',serif;font-size:22px;color:#BC7A45;">11</div><div style="font-size:11px;color:#8A7C6C;">Remaining</div>
        </div>
      </div>

      <div style="display:flex;gap:12px;margin-top:16px;">
        <div style="flex:1;border:1px solid #DBC9B0;border-radius:10px;padding:10px 14px;font-size:13px;color:#8A7C6C;background:#fff;">⌕ Search attendee...</div>
        <div style="border:1px solid #DBC9B0;border-radius:10px;padding:10px 16px;font-size:13px;background:#fff;"> Filter</div>
      </div>

      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:8px;font-size:11px;color:#8A7C6C;margin-top:16px;padding:0 6px;">
        <div>Attendee</div><div>Ticket</div><div>Status</div><div>Check-in Time</div>
      </div>
      <div style="display:flex;flex-direction:column;">
        <sc-for list="{{ attendees }}" as="a" hint-placeholder-count="6">
          <a href="AttendeeDetail.dc.html" style="display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:8px;align-items:center;padding:10px 6px;border-top:1px solid #EFE4D4;font-size:13px;text-decoration:none;color:#463F37;">
            <div style="display:flex;align-items:center;gap:8px;"><div style="width:26px;height:26px;border-radius:50%;background:#DBC9B0;flex-shrink:0;"></div>{{ a.name }}</div>
            <div>{{ a.ticket }}</div>
            <div><span style="font-size:11px;background:{{ a.badgeBg }};color:{{ a.badgeColor }};padding:3px 10px;border-radius:10px;">{{ a.status }}</span></div>
            <div style="color:#8A7C6C;font-size:12px;">{{ a.time }}</div>
          </a>
        </sc-for>
      </div>

      <div style="text-align:center;background:#3A342C;color:#fff;border-radius:22px;padding:13px;font-size:14px;font-weight:600;margin-top:20px;">▦ Scan QR Code</div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      attendees: [
        { name: 'Emma Anderson', ticket: 'Child', status: 'Checked In', badgeBg: '#EAEBE1', badgeColor: '#6E7459', time: '09:55 AM' },
        { name: 'Olivia Hansen', ticket: 'Child', status: 'Checked In', badgeBg: '#EAEBE1', badgeColor: '#6E7459', time: '09:57 AM' },
        { name: 'Noah Johansen', ticket: 'Child', status: 'Checked In', badgeBg: '#EAEBE1', badgeColor: '#6E7459', time: '10:01 AM' },
        { name: 'Sofia Nilsen', ticket: 'Child', status: 'Pending', badgeBg: '#EFE4D4', badgeColor: '#BC7A45', time: '--' },
        { name: 'Lucas Dahl', ticket: 'Child', status: 'Pending', badgeBg: '#EFE4D4', badgeColor: '#BC7A45', time: '--' },
        { name: 'Mia Kristensen', ticket: 'Child', status: 'Pending', badgeBg: '#EFE4D4', badgeColor: '#BC7A45', time: '--' },
      ],
    };
  }
}

</script>
</body>
</html>
