<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="display:flex;font-family:'Hanken Grotesk',sans-serif;color:#2A2620;background:#F6F0E8;min-height:100vh;">
  <dc-import name="AdminSidebar" active="finance" hint-size="220px,100%"></dc-import>
  <div style="flex:1;padding:32px 40px;">
    <div style="font-family:'Newsreader',serif;font-size:26px;">Finance — Commissions</div>
    <div style="font-size:13px;color:#8A7C6C;margin-top:4px;">Platform commission earned across marketplace, bookings and partner sales</div>

    <div style="display:flex;gap:10px;margin-top:18px;">
      <sc-for list="{{ subnav }}" as="n" hint-placeholder-count="6">
        <a href="{{ n.href }}" style="text-decoration:none;border-radius:20px;padding:8px 16px;font-size:12px;background:{{ n.bg }};color:{{ n.color }};font-weight:600;">{{ n.label }}</a>
      </sc-for>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:22px;">
      <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:18px;">
          <div style="font-size:11px;color:#8A7C6C;">{{ s.label }}</div>
          <div style="font-family:'Newsreader',serif;font-size:22px;margin-top:6px;">{{ s.value }}</div>
          <div style="font-size:11px;margin-top:4px;color:{{ s.color }};">{{ s.delta }}</div>
        </div>
      </sc-for>
    </div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;margin-top:22px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;padding:12px 18px;font-size:11px;color:#8A7C6C;border-bottom:1px solid #F1E9DC;">
        <div>Source</div><div>Transaction</div><div>Gross</div><div>Commission rate</div><div>Commission owed</div>
      </div>
      <sc-for list="{{ rows }}" as="r" hint-placeholder-count="7">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;padding:13px 18px;font-size:13px;align-items:center;border-bottom:1px solid #F6F0E8;">
          <div>{{ r.source }}</div>
          <div style="color:#8A7C6C;">{{ r.tx }}</div>
          <div>{{ r.gross }}</div>
          <div style="color:#8A7C6C;">{{ r.rate }}</div>
          <div style="font-weight:600;">{{ r.owed }}</div>
        </div>
      </sc-for>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      subnav: [
        { label: 'Overview', bg: '#F1E9DC', color: '#463F37', href: 'AdminFinanceCommissions.dc.html' },
        { label: 'Refunds', bg: '#F1E9DC', color: '#463F37', href: 'AdminFinanceRefunds.dc.html' },
        { label: 'Disputes', bg: '#F1E9DC', color: '#463F37', href: 'AdminFinanceDisputes.dc.html' },
        { label: 'Commissions', bg: '#3A342C', color: '#fff', href: 'AdminFinanceCommissions.dc.html' },
        { label: 'Payouts', bg: '#F1E9DC', color: '#463F37', href: 'AdminFinancePayouts.dc.html' },
        { label: 'Invoices', bg: '#F1E9DC', color: '#463F37', href: 'AdminFinanceInvoices.dc.html' },
      ],
      stats: [
        { label: 'Commission this month', value: '48,210 NOK', delta: '+6.1% vs last month', color: '#6E7459' },
        { label: 'Marketplace share', value: '61%', delta: 'of total commission', color: '#8A7C6C' },
        { label: 'Bookings share', value: '27%', delta: 'of total commission', color: '#8A7C6C' },
        { label: 'Partner sales share', value: '12%', delta: 'of total commission', color: '#8A7C6C' },
      ],
      rows: [
        { source: 'Marketplace', tx: '#ORD-8821', gross: '450 NOK', rate: '8%', owed: '36 NOK' },
        { source: 'Expert booking', tx: '#BKG-3390', gross: '900 NOK', rate: '15%', owed: '135 NOK' },
        { source: 'Partner sale', tx: '#PS-1187', gross: '1,200 NOK', rate: '10%', owed: '120 NOK' },
        { source: 'Marketplace', tx: '#ORD-8830', gross: '280 NOK', rate: '8%', owed: '22.4 NOK' },
        { source: 'Event ticket', tx: '#TKT-5541', gross: '350 NOK', rate: '5%', owed: '17.5 NOK' },
        { source: 'Expert booking', tx: '#BKG-3402', gross: '650 NOK', rate: '15%', owed: '97.5 NOK' },
        { source: 'Marketplace', tx: '#ORD-8844', gross: '620 NOK', rate: '8%', owed: '49.6 NOK' },
      ],
    };
  }
}

</script>
</body>
</html>
