<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import>
    <div style="max-width:560px;padding:32px 40px;">
      <a href="MyListings.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to Orders</a>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
        <div style="font-family:'Newsreader',serif;font-size:22px;">Order #HDD-2025-00048</div>
        <div style="font-size:11px;background:#EFE4D4;color:#BC7A45;padding:5px 12px;border-radius:12px;">In Transit</div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#7C7062;margin-top:14px;">
        <div><div>Estimated delivery</div><div style="font-weight:600;color:#463F37;margin-top:2px;">Jun 2 – Jun 4, 2025</div></div>
        <div style="text-align:right;"><div>Shipping to</div><div style="font-weight:600;color:#463F37;margin-top:2px;">Grünerløkka 15, 0550 Oslo</div></div>
      </div>

      <div style="font-size:14px;font-weight:600;margin-top:24px;">Tracking Progress</div>
      <div style="margin-top:14px;">
        <sc-for list="{{ steps }}" as="s" hint-placeholder-count="5">
          <div style="display:flex;gap:12px;">
            <div style="display:flex;flex-direction:column;align-items:center;">
              <div style="width:22px;height:22px;border-radius:50%;background:{{ s.bg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;">{{ s.icon }}</div>
              <sc-if value="{{ s.hasLine }}" hint-placeholder-val="{{ true }}">
                <div style="width:2px;flex:1;background:#DBC9B0;min-height:24px;"></div>
              </sc-if>
            </div>
            <div style="padding-bottom:20px;">
              <div style="font-size:13px;font-weight:600;color:{{ s.textColor }};">{{ s.label }}</div>
              <div style="font-size:11px;color:#8A7C6C;">{{ s.date }}</div>
            </div>
          </div>
        </sc-for>
      </div>

      <div style="background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:16px;margin-top:10px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px;">Shipping Details</div>
        <div style="display:flex;justify-content:space-between;font-size:12px;">
          <div><div style="color:#8A7C6C;">Carrier</div><div style="font-weight:600;margin-top:2px;">Posten Norge</div></div>
          <div><div style="color:#8A7C6C;">Tracking Number</div><div style="font-weight:600;margin-top:2px;">PA123456789NO ⧉</div></div>
        </div>
      </div>

      <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:13px;font-size:13px;margin-top:20px;">View Order Details</div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      steps: [
        { icon: '✓', bg: '#6E7459', label: 'Order Confirmed', date: 'May 26, 2025, 10:34', textColor: '#463F37', hasLine: true },
        { icon: '✓', bg: '#6E7459', label: 'Processing', date: 'May 26, 2025, 14:20', textColor: '#463F37', hasLine: true },
        { icon: '●', bg: '#BC7A45', label: 'Shipped', date: 'May 27, 2025, 09:15', textColor: '#463F37', hasLine: true },
        { icon: '○', bg: '#DBC9B0', label: 'Out for Delivery', date: 'Expected Jun 2, 2025', textColor: '#8A7C6C', hasLine: true },
        { icon: '○', bg: '#DBC9B0', label: 'Delivered', date: 'Expected Jun 2 – Jun 4, 2025', textColor: '#8A7C6C', hasLine: false },
      ],
    };
  }
}

</script>
</body>
</html>
