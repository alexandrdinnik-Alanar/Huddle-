<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="services" hint-size="100%,64px"></dc-import>
  <div style="max-width:480px;margin:0 auto;padding:32px 40px;">
    <a href="BookingReschedule.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back</a>
    <div style="font-family:'Newsreader',serif;font-size:22px;margin-top:10px;">Cancel Appointment</div>
    <div style="font-size:13px;color:#7C7062;margin-top:4px;">Please let us know why you're canceling.</div>

    <div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #DBC9B0;border-radius:12px;padding:12px;margin-top:16px;">
      <div style="width:40px;height:40px;border-radius:8px;background:#3A342C;color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;">BM</div>
      <div>
        <div style="font-size:13px;font-weight:600;">Bright Minds Center</div>
        <div style="font-size:11px;color:#8A7C6C;">Family Counseling · May 24, 2025 at 10:00</div>
      </div>
    </div>

    <div style="font-size:13px;font-weight:600;margin-top:18px;">Reason for cancellation (optional)</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
      <sc-for list="{{ reasons }}" as="r" hint-placeholder-count="5">
        <div style="display:flex;align-items:center;gap:10px;font-size:13px;">
          <div style="width:16px;height:16px;border-radius:50%;border:1px solid {{ r.border }};display:flex;align-items:center;justify-content:center;">
            <sc-if value="{{ r.selected }}" hint-placeholder-val="{{ false }}"><div style="width:9px;height:9px;border-radius:50%;background:#B0453A;"></div></sc-if>
          </div>{{ r.label }}
        </div>
      </sc-for>
    </div>

    <div style="font-size:12px;color:#7C7062;margin-top:16px;margin-bottom:6px;">Additional notes (optional)</div>
    <div style="border:1px solid #DBC9B0;border-radius:10px;padding:12px 14px;font-size:13px;color:#8A7C6C;background:#fff;height:60px;">Share any additional details...</div>

    <div style="background:#B0453A;color:#fff;text-align:center;border-radius:24px;padding:13px;font-size:14px;font-weight:600;margin-top:22px;">Cancel Appointment</div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      reasons: [
        { label: 'Schedule conflict', border: '#B0453A', selected: true },
        { label: 'Feeling better', border: '#DBC9B0', selected: false },
        { label: 'Found another provider', border: '#DBC9B0', selected: false },
        { label: 'Personal reasons', border: '#DBC9B0', selected: false },
        { label: 'Other', border: '#DBC9B0', selected: false },
      ],
    };
  }
}

</script>
</body>
</html>
