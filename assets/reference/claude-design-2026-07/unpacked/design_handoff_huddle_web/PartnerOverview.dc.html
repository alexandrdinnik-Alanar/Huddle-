<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="PartnerSidebar" active="overview" hint-size="230px,600px"></dc-import>
    <div style="max-width:900px;padding:32px 40px;">
      <div style="font-family:'Newsreader',serif;font-size:26px;">Welcome, BabyShop Norway</div>
      <div style="font-size:13px;color:#7C7062;margin-top:4px;">Your partner application is under review.</div>

      <div style="background:#EFE4D4;border-radius:12px;padding:16px;margin-top:20px;display:flex;align-items:center;gap:10px;">
        <span style="color:#BC7A45;font-size:16px;">◷</span>
        <div style="font-size:13px;color:#7C7062;">We'll review your application and get back to you within 2–3 business days.</div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px;">
        <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
          <div style="background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:16px;">
            <div style="font-size:11px;color:#8A7C6C;">{{ s.label }}</div>
            <div style="font-family:'Newsreader',serif;font-size:22px;margin-top:4px;">{{ s.value }}</div>
          </div>
        </sc-for>
      </div>

      <div style="font-size:15px;font-weight:600;margin-top:26px;">Setup Progress</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">
        <sc-for list="{{ setupSteps }}" as="st" hint-placeholder-count="5">
          <div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #DBC9B0;border-radius:12px;padding:14px;">
            <span style="color:#6E7459;">✓</span>
            <div style="flex:1;font-size:13px;font-weight:600;">{{ st }}</div>
          </div>
        </sc-for>
      </div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      stats: [
        { label: 'Products Live', value: '152' },
        { label: 'Pending Review', value: '28' },
        { label: 'Orders This Month', value: '64' },
        { label: 'Revenue', value: 'NOK 48 200' },
      ],
      setupSteps: [
        'Business Information submitted',
        'Business Verified',
        'Store Profile created',
        'Product Feed connected',
        'Partner Agreement accepted',
      ],
    };
  }
}

</script>
</body>
</html>
