<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="" hint-size="100%,64px"></dc-import>

  <div style="max-width:820px;margin:0 auto;padding:32px 40px;">
    <div style="height:170px;border-radius:16px;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);position:relative;"></div>

    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:-40px;padding:0 4px;position:relative;">
      <div style="width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);border:4px solid #F6F0E8;"></div>
      <div style="display:flex;gap:10px;margin-bottom:6px;">
        <div style="border:1px solid #DBC9B0;background:#fff;border-radius:20px;padding:9px 18px;font-size:12px;"> Edit Profile</div>
        <div style="border:1px solid #DBC9B0;background:#fff;border-radius:20px;padding:9px 14px;font-size:12px;">⋯</div>
      </div>
    </div>

    <div style="font-family:'Newsreader',serif;font-size:24px;margin-top:14px;">David Anderson</div>
    <div style="font-size:12px;color:#8A7C6C;margin-top:4px;">Member since Jan 2024 &nbsp;·&nbsp; ★ 4.9 (28)</div>

    <div style="display:flex;gap:26px;margin-top:20px;border-bottom:1px solid #DBC9B0;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
        <div style="font-size:13px;padding-bottom:10px;color:{{ t.color }};border-bottom:2px solid {{ t.border }};">{{ t.label }}</div>
      </sc-for>
    </div>

    <div style="font-size:15px;font-weight:600;margin-top:22px;">About Me</div>
    <div style="font-size:13px;color:#7C7062;margin-top:8px;line-height:1.6;">Father of two amazing kids. Love outdoor activities, photography and connecting with local families.</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;">
      <sc-for list="{{ info }}" as="i" hint-placeholder-count="4">
        <div style="display:flex;justify-content:space-between;font-size:13px;padding:10px 0;border-bottom:1px solid #EFE4D4;">
          <span style="color:#8A7C6C;">{{ i.icon }} {{ i.label }}</span>
          <span style="font-weight:600;">{{ i.value }}</span>
        </div>
      </sc-for>
    </div>
  </div>

  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'About', color: '#463F37', border: '#BC7A45' },
        { label: 'Activity', color: '#8A7C6C', border: 'transparent' },
        { label: 'Groups (6)', color: '#8A7C6C', border: 'transparent' },
        { label: 'Events (12)', color: '#8A7C6C', border: 'transparent' },
        { label: 'Reviews (8)', color: '#8A7C6C', border: 'transparent' },
      ],
      info: [
        { icon: '', label: 'Location', value: 'Oslo, Norway' },
        { icon: '', label: 'Occupation', value: 'Photographer' },
        { icon: '', label: 'Languages', value: 'English, Norsk' },
        { icon: '★', label: 'Interests', value: 'Photography, Hiking, Travel' },
      ],
    };
  }
}

</script>
</body>
</html>
