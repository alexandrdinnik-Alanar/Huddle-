<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="display:flex;font-family:'Hanken Grotesk',sans-serif;color:#2A2620;background:#F6F0E8;min-height:100vh;">
  <dc-import name="AdminSidebar" active="users" hint-size="220px,100%"></dc-import>
  <div style="flex:1;padding:32px 40px;">
    <div style="font-family:'Newsreader',serif;font-size:26px;">User Management</div>
    <div style="font-size:13px;color:#8A7C6C;margin-top:4px;">12,540 registered accounts</div>

    <div style="display:flex;gap:10px;margin-top:20px;">
      <div style="flex:1;border:1px solid #DBC9B0;border-radius:10px;padding:10px 14px;font-size:13px;background:#fff;display:flex;align-items:center;gap:8px;">
        <dc-import name="Icon" icon-name="search" color="#8A7C6C" size="14" hint-size="14,14"></dc-import>
        <span style="color:#8A7C6C;">Search by name, email or ID…</span>
      </div>
      <sc-for list="{{ filters }}" as="f" hint-placeholder-count="3">
        <div style="border:1px solid #DBC9B0;border-radius:10px;padding:10px 16px;font-size:13px;background:#fff;">{{ f }}</div>
      </sc-for>
    </div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;margin-top:20px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:2fr 1.4fr 1fr 1fr 1fr 90px;padding:12px 18px;font-size:11px;color:#8A7C6C;border-bottom:1px solid #F1E9DC;">
        <div>Name</div><div>Email</div><div>Role</div><div>Status</div><div>Joined</div><div></div>
      </div>
      <sc-for list="{{ users }}" as="u" hint-placeholder-count="8">
        <div style="display:grid;grid-template-columns:2fr 1.4fr 1fr 1fr 1fr 90px;padding:13px 18px;font-size:13px;align-items:center;border-bottom:1px solid #F6F0E8;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:30px;height:30px;border-radius:50%;background:#DBC9B0;"></div>{{ u.name }}
          </div>
          <div style="color:#8A7C6C;">{{ u.email }}</div>
          <div>{{ u.role }}</div>
          <div><span style="background:{{ u.statusBg }};color:{{ u.statusColor }};border-radius:10px;padding:3px 10px;font-size:11px;">{{ u.status }}</span></div>
          <div style="color:#8A7C6C;">{{ u.joined }}</div>
          <div style="display:flex;gap:8px;">
            <dc-import name="Icon" icon-name="ban" color="#B4553C" size="15" hint-size="15,15"></dc-import>
          </div>
        </div>
      </sc-for>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

    return {

        { name: 'Martin Larsen', email: 'martin.l@mail.no', role: 'Parent', status: 'Active', statusBg: '#EAEBE1', statusColor: '#6E7459', joined: 'Feb 2025' },
        { name: 'Kids Activities Oslo', email: 'hello@kidsoslo.no', role: 'Organizer', status: 'Active', statusBg: '#EAEBE1', statusColor: '#6E7459', joined: 'Nov 2024' },
        { name: 'Nordic Baby Store', email: 'contact@nordicbaby.no', role: 'Partner', status: 'Under review', statusBg: '#F1E9DC', statusColor: '#8A7C6C', joined: 'Mar 2025' },
        { name: 'Julie Hansen', email: 'julie.h@mail.no', role: 'Parent', status: 'Reported', statusBg: '#F5DCD4', statusColor: '#B4553C', joined: 'Dec 2024' },
        { name: 'Sara Vik', email: 'sara.v@mail.no', role: 'Expert', status: 'Active', statusBg: '#EAEBE1', statusColor: '#6E7459', joined: 'Apr 2025' },

}

</body>
</html>
