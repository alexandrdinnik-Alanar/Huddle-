<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="services" hint-size="100%,64px"></dc-import>
  <div style="max-width:640px;margin:0 auto;padding:32px 40px;">
    <div style="font-family:'Newsreader',serif;font-size:24px;">All Categories</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">
      <sc-for list="{{ categories }}" as="c" hint-placeholder-count="8">
        <a href="ServiceListings.dc.html" style="display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #DBC9B0;border-radius:12px;padding:14px;text-decoration:none;color:#463F37;">
          <span style="font-size:16px;color:#BC7A45;">{{ c.icon }}</span>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">{{ c.name }}</div>
            <div style="font-size:11px;color:#8A7C6C;">{{ c.desc }}</div>
          </div>
          <span style="color:#8A7C6C;">›</span>
        </a>
      </sc-for>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      categories: [
        { icon: '♡', name: 'Health & Wellness', desc: 'Doctors, therapists, fitness and more' },
        { icon: '', name: 'Education', desc: 'Tutors, classes, schools and more' },
        { icon: '⌂', name: 'Home Services', desc: 'Cleaning, repairs, maintenance and more' },
        { icon: '', name: 'Family Support', desc: 'Counseling, support groups and more' },
        { icon: '', name: 'Pet Services', desc: 'Vet, grooming, training and more' },
        { icon: '', name: 'Transportation', desc: 'Rides, rentals, car seats and more' },
        { icon: '', name: 'Events & Entertainment', desc: 'Parties, events, venues and more' },
        { icon: '⚖', name: 'Legal & Financial', desc: 'Legal, financial and insurance services' },
      ],
    };
  }
}

</script>
</body>
</html>
