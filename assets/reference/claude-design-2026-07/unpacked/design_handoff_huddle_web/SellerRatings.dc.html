<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import>
    <div style="max-width:560px;padding:32px 40px;">
      <a href="MyListings.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to My Listings</a>
      <div style="font-family:'Newsreader',serif;font-size:22px;margin-top:14px;">Ratings & Reviews</div>
      <div style="font-size:13px;color:#7C7062;margin-top:4px;">See what buyers say about you.</div>

      <div style="display:flex;align-items:baseline;gap:12px;margin-top:18px;">
        <div style="font-family:'Newsreader',serif;font-size:34px;">4.9</div>
        <div style="color:#BC7A45;font-size:16px;">★★★★★</div>
        <div style="font-size:12px;color:#8A7C6C;">(28 reviews)</div>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">
        <sc-for list="{{ bars }}" as="b" hint-placeholder-count="5">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="font-size:11px;width:40px;color:#7C7062;">{{ b.label }}</div>
            <div style="flex:1;height:6px;background:#EFE4D4;border-radius:4px;overflow:hidden;"><div style="height:100%;width:{{ b.pct }};background:#6E7459;"></div></div>
            <div style="font-size:11px;color:#8A7C6C;width:20px;text-align:right;">{{ b.count }}</div>
          </div>
        </sc-for>
      </div>

      <div style="font-size:14px;font-weight:600;margin-top:24px;">Recent Reviews</div>
      <div style="display:flex;flex-direction:column;gap:16px;margin-top:12px;">
        <sc-for list="{{ reviews }}" as="r" hint-placeholder-count="2">
          <div style="display:flex;gap:12px;">
            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);flex-shrink:0;"></div>
            <div style="flex:1;">
              <div style="display:flex;justify-content:space-between;">
                <div style="font-size:13px;font-weight:600;">{{ r.name }}</div>
                <div style="font-size:11px;color:#8A7C6C;">{{ r.date }}</div>
              </div>
              <div style="color:#BC7A45;font-size:12px;margin-top:2px;">★★★★★</div>
              <div style="font-size:12px;color:#7C7062;margin-top:4px;">{{ r.text }}</div>
            </div>
          </div>
        </sc-for>
      </div>

      <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:20px;">View All Reviews</div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      bars: [
        { label: '5 stars', pct: '86%', count: 24 },
        { label: '4 stars', pct: '11%', count: 3 },
        { label: '3 stars', pct: '3%', count: 1 },
        { label: '2 stars', pct: '0%', count: 0 },
        { label: '1 star', pct: '0%', count: 0 },
      ],
      reviews: [
        { name: 'Emma Anderson', date: 'May 28, 2025', text: 'Great seller! Item was exactly as described and pickup was easy.' },
        { name: 'Maria Hansen', date: 'May 22, 2025', text: 'Very friendly and responsive. Would recommend!' },
      ],
    };
  }
}

</script>
</body>
</html>
