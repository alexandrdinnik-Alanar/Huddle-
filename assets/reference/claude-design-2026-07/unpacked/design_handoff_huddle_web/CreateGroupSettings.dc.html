<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px 60px;">
    <div style="display:flex;align-items:center;gap:4px;">
      <sc-for list="{{ dots }}" as="d" hint-placeholder-count="5">
        <div style="width:24px;height:24px;border-radius:50%;background:{{ d.bg }};color:{{ d.color }};font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <sc-if value="{{ d.done }}" hint-placeholder-val="{{ false }}"><dc-import name="Icon" icon-name="check" color="#fff" size="11" hint-size="11,11"></dc-import></sc-if>
          <sc-if value="{{ d.notDone }}" hint-placeholder-val="{{ true }}">{{ d.num }}</sc-if>
        </div>
        <sc-if value="{{ d.hasLine }}" hint-placeholder-val="{{ true }}"><div style="flex:1;height:1px;background:#DBC9B0;"></div></sc-if>
      </sc-for>
    </div>

    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-top:20px;">Step 2 of 5</div>
    <div style="font-family:'Newsreader',serif;font-size:25px;color:#3A342C;margin-top:4px;">Group settings</div>
    <div style="font-size:13px;color:#7C7062;margin-top:4px;">Configure your group privacy and member settings.</div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:24px 26px;margin-top:20px;box-shadow:0 12px 30px rgba(150,110,70,.08);">
      <div style="font-size:13px;font-weight:600;color:#3A342C;margin-bottom:10px;">Privacy settings</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
        <sc-for list="{{ privacy }}" as="p" hint-placeholder-count="3">
          <div style="border:1px solid {{ p.border }};background:{{ p.bg }};border-radius:14px;padding:14px;cursor:pointer;">
            <dc-import name="Icon" icon-name="{{ p.icon }}" color="#BC7A45" size="18" hint-size="18,18"></dc-import>
            <div style="font-size:12.5px;font-weight:600;margin-top:8px;color:#3A342C;">{{ p.title }}</div>
            <div style="font-size:10.5px;color:#8A7C6C;margin-top:3px;line-height:1.4;">{{ p.desc }}</div>
          </div>
        </sc-for>
      </div>

      <div style="font-size:13px;font-weight:600;color:#3A342C;margin-top:22px;margin-bottom:10px;">Membership approval</div>
      <div style="display:flex;flex-direction:column;gap:11px;">
        <sc-for list="{{ approval }}" as="a" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;gap:10px;font-size:13px;color:#463F37;cursor:pointer;">
            <div style="width:16px;height:16px;border-radius:50%;border:1.5px solid {{ a.border }};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <sc-if value="{{ a.selected }}" hint-placeholder-val="{{ false }}"><div style="width:8px;height:8px;border-radius:50%;background:#BC7A45;"></div></sc-if>
            </div>{{ a.label }}
          </div>
        </sc-for>
      </div>

      <div style="font-size:12px;color:#7C7062;margin-top:18px;margin-bottom:6px;font-weight:600;">Who can post?</div>
      <div style="border:1px solid #DBC9B0;border-radius:12px;padding:12px 15px;font-size:13.5px;display:flex;justify-content:space-between;background:#fff;">All members <span style="color:#A99B89;">▾</span></div>
    </div>

    <div style="display:flex;gap:12px;margin-top:24px;">
      <a href="CreateGroupBasicInfo.dc.html" style="flex:1;text-decoration:none;text-align:center;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:24px;padding:13px;font-size:13.5px;font-weight:500;">← Back</a>
      <a href="CreateGroupInviteMembers.dc.html" style="flex:1;text-decoration:none;text-align:center;background:#BC7A45;color:#fff;border-radius:24px;padding:13px;font-size:13.5px;font-weight:600;box-shadow:0 12px 26px rgba(188,122,69,.28);" style-hover="background:#A9663A;">Continue →</a>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const dots = [1, 2, 3, 4, 5].map((n) => ({
      num: n, done: n <= 2, notDone: n > 2,
      bg: n <= 2 ? '#3A342C' : '#EFE4D4', color: n <= 2 ? '#fff' : '#463F37', hasLine: n < 5,
    }));
    return {
      dots,
      privacy: [
        { icon: 'home', title: 'Public', desc: "Anyone can find the group and see who's in it.", border: '#BC7A45', bg: '#F2E6D6' },
        { icon: 'lock', title: 'Private', desc: 'Only members can find the group.', border: '#DBC9B0', bg: '#fff' },
        { icon: 'shield', title: 'Hidden', desc: 'Only invited members can find the group.', border: '#DBC9B0', bg: '#fff' },
      ],
      approval: [
        { label: 'Anyone can join', border: '#BC7A45', selected: true },
        { label: 'Admin approval required', border: '#DBC9B0', selected: false },
        { label: 'Invite only', border: '#DBC9B0', selected: false },
      ],
    };
  }
}
</script>
</body>
</html>
