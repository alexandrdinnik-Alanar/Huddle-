  <div style="position:relative;width:100%;max-width:440px;background:#FCF9F3;border:1px solid #EADCC8;border-radius:24px;padding:40px 38px;box-shadow:0 24px 60px rgba(120,86,52,.16);">
    <a href="Home.dc.html" style="display:block;"><img src="assets/Huddle_wordmark.png" alt="Huddle" style="height:28px;display:block;margin:0 auto 26px;"></a>

    <h1 style="font-family:'Newsreader',serif;font-size:28px;font-weight:500;color:#3A342C;text-align:center;margin:0;">Reset your password</h1>
