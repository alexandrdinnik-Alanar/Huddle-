<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="events" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px 60px;">
    <div style="display:flex;align-items:center;gap:4px;">
      <sc-for list="{{ dots }}" as="d" hint-placeholder-count="6">
        <div style="width:24px;height:24px;border-radius:50%;background:#3A342C;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="check" color="#fff" size="11" hint-size="11,11"></dc-import></div>
        <sc-if value="{{ d.hasLine }}" hint-placeholder-val="{{ true }}"><div style="flex:1;height:1px;background:#DBC9B0;"></div></sc-if>
      </sc-for>
    </div>

    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-top:20px;">Step 6 of 6</div>
    <div style="font-family:'Newsreader',serif;font-size:25px;color:#3A342C;margin-top:4px;">Review &amp; publish</div>
    <div style="font-size:13px;color:#7C7062;margin-top:4px;">Review your event details before publishing.</div>

    <div style="display:flex;gap:16px;background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:16px;margin-top:20px;box-shadow:0 12px 30px rgba(150,110,70,.08);">
      <div style="width:72px;height:72px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#D79A62,#B26A38);"></div>
      <div>
        <div style="font-family:'Newsreader',serif;font-size:18px;color:#3A342C;">Kids Yoga Workshop</div>
        <div style="font-size:12px;color:#7C7062;display:flex;align-items:center;gap:5px;margin-top:4px;"><dc-import name="Icon" icon-name="calendar" color="#9E5A2C" size="12" hint-size="12,12"></dc-import>Sat, Jun 7, 2026 · 10:00–11:30 AM</div>
        <div style="font-size:12px;color:#7C7062;display:flex;align-items:center;gap:5px;margin-top:2px;"><dc-import name="Icon" icon-name="pin" color="#9E5A2C" size="12" hint-size="12,12"></dc-import>Grünerløkka Community Center, Oslo</div>
        <div style="font-size:12px;color:#7C7062;display:flex;align-items:center;gap:5px;margin-top:2px;"><dc-import name="Icon" icon-name="people" color="#9E5A2C" size="12" hint-size="12,12"></dc-import>50 spots available</div>
      </div>
    </div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:18px 22px;margin-top:14px;box-shadow:0 12px 30px rgba(150,110,70,.08);">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;"><div style="font-family:'Newsreader',serif;font-size:17px;color:#3A342C;">Summary</div><span style="font-size:12px;color:#9E5A2C;font-weight:600;cursor:pointer;">Edit</span></div>
      <sc-for list="{{ summary }}" as="s" hint-placeholder-count="5">
        <div style="display:flex;justify-content:space-between;gap:16px;font-size:13px;border-bottom:1px solid #F2E9DA;padding:11px 0;">
          <span style="color:#8A7C6C;flex-shrink:0;">{{ s.label }}</span><span style="font-weight:600;text-align:right;color:#3A342C;">{{ s.value }}</span>
        </div>
      </sc-for>
    </div>

    <div style="display:flex;gap:12px;margin-top:24px;">
      <a href="CreateEventOrganizerContact.dc.html" style="flex:1;text-decoration:none;text-align:center;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:24px;padding:13px;font-size:13.5px;font-weight:500;">← Back</a>
      <a href="EventPublished.dc.html" style="flex:1;text-decoration:none;text-align:center;background:#BC7A45;color:#fff;border-radius:24px;padding:13px;font-size:13.5px;font-weight:600;box-shadow:0 12px 26px rgba(188,122,69,.28);" style-hover="background:#A9663A;">Publish event →</a>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      dots: [1, 2, 3, 4, 5, 6].map((n) => ({ hasLine: n < 6 })),
      summary: [
        { label: 'Category', value: 'Health & Wellness' },
        { label: 'Event type', value: 'Offline' },
        { label: 'Tickets', value: '3 types' },
        { label: 'Organizer', value: 'Emma Andersen' },
        { label: 'Contact', value: 'emma.a@example.com · +47 987 65 432' },
      ],
    };
  }
}
</script>
</body>
</html>
