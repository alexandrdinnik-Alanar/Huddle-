<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>
  <div style="max-width:560px;margin:0 auto;padding:32px 40px;">
    <a href="MyGroupsList.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to Groups</a>

    <div style="display:flex;align-items:center;gap:12px;margin-top:14px;">
      <div style="width:52px;height:52px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
      <div style="flex:1;">
        <div style="font-family:'Newsreader',serif;font-size:19px;">Oslo Runners Club</div>
        <div style="font-size:12px;color:#7C7062;">Public Group · 12 members</div>
      </div>
      <div style="font-size:12px;border:1px solid #6E7459;color:#6E7459;background:#EAEBE1;padding:6px 14px;border-radius:16px;">Joined</div>
    </div>

    <div style="display:flex;gap:26px;margin-top:18px;border-bottom:1px solid #DBC9B0;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
        <div style="font-size:13px;padding-bottom:10px;color:{{ t.color }};border-bottom:2px solid {{ t.border }};">{{ t.label }}</div>
      </sc-for>
    </div>

    <div style="border:1px solid #DBC9B0;border-radius:10px;padding:10px 14px;font-size:13px;color:#8A7C6C;background:#fff;display:flex;justify-content:space-between;margin-top:16px;">⌕ Search members... <span> Filter</span></div>

    <div style="font-size:13px;font-weight:600;margin-top:18px;">Admins</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
      <sc-for list="{{ admins }}" as="a" hint-placeholder-count="2">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);flex-shrink:0;"></div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:600;">{{ a.name }}</div><div style="font-size:11px;color:#8A7C6C;">@{{ a.handle }}</div></div>
          <div style="font-size:11px;background:#EAEBE1;color:#6E7459;padding:4px 12px;border-radius:12px;">Admin</div>
          <span style="color:#8A7C6C;">⋯</span>
        </div>
      </sc-for>
    </div>

    <div style="font-size:13px;font-weight:600;margin-top:18px;">Members (10)</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
      <sc-for list="{{ members }}" as="m" hint-placeholder-count="3">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);flex-shrink:0;"></div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:600;">{{ m.name }}</div><div style="font-size:11px;color:#8A7C6C;">@{{ m.handle }}</div></div>
          <div style="font-size:11px;background:#EFE4D4;color:#BC7A45;padding:4px 12px;border-radius:12px;">Member</div>
          <span style="color:#8A7C6C;">⋯</span>
        </div>
      </sc-for>
    </div>

    <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:20px;">Show all members ▾</div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'Feed', color: '#8A7C6C', border: 'transparent' },
        { label: 'Members', color: '#463F37', border: '#BC7A45' },
        { label: 'Events', color: '#8A7C6C', border: 'transparent' },
        { label: 'About', color: '#8A7C6C', border: 'transparent' },
      ],
      admins: [
        { name: 'Emma Anderson', handle: 'emma.anderson' },
        { name: 'Liam Anderson', handle: 'liam.anderson' },
      ],
      members: [
        { name: 'Olivia Hansen', handle: 'olivia.hansen' },
        { name: 'Noah Johansen', handle: 'noah.johansen' },
        { name: 'Sofia Nilsen', handle: 'sofia.nilsen' },
      ],
    };
  }
}

</script>
</body>
</html>
