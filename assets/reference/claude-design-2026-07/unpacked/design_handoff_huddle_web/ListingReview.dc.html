<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import>
    <div style="max-width:520px;padding:32px 40px;">
      <div style="font-family:'Newsreader',serif;font-size:22px;">Review your listing</div>
      <div style="font-size:13px;color:#7C7062;margin-top:4px;">Please review all details before publishing.</div>

      <div style="height:220px;border-radius:14px;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);margin-top:18px;"></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <sc-for list="{{ thumbs }}" as="t" hint-placeholder-count="4">
          <div style="width:56px;height:56px;border-radius:8px;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);border:{{ t.border }};"></div>
        </sc-for>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:18px;">
        <div>
          <div style="font-size:16px;font-weight:600;">Stokke Trailz Stroller</div>
          <div style="font-size:14px;font-weight:600;color:#BC7A45;margin-top:2px;">NOK 2,500</div>
        </div>
        <span style="font-size:12px;color:#BC7A45;display:flex;align-items:center;gap:4px;"><dc-import name="Icon" icon-name="edit" color="#BC7A45" size="12" hint-size="12,12"></dc-import>Edit</span>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;margin-top:16px;">
        <sc-for list="{{ details }}" as="d" hint-placeholder-count="5">
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;border-bottom:1px solid #EFE4D4;padding-bottom:10px;">
            <span style="color:#8A7C6C;display:flex;align-items:center;gap:6px;"><dc-import name="Icon" icon-name="{{ d.icon }}" color="#8A7C6C" size="14" hint-size="14,14"></dc-import>{{ d.label }}</span>
            <span style="font-weight:600;text-align:right;max-width:60%;">{{ d.value }}</span>
          </div>
        </sc-for>
      </div>

      <div style="display:flex;gap:12px;margin-top:24px;">
        <a href="EditListing.dc.html" style="flex:1;text-decoration:none;text-align:center;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:22px;padding:13px;font-size:14px;">Edit Listing</a>
        <a href="ListingPublished.dc.html" style="flex:1;text-decoration:none;text-align:center;background:#3A342C;color:#fff;border-radius:22px;padding:13px;font-size:14px;font-weight:600;">Publish Listing</a>
      </div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      thumbs: [
        { border: '2px solid #BC7A45' },
        { border: '1px solid #DBC9B0' },
        { border: '1px solid #DBC9B0' },
        { border: '1px solid #DBC9B0' },
      ],
      details: [
        { icon: 'bag', label: 'Category', value: 'Baby Gear' },
        { icon: 'check', label: 'Condition', value: 'Like New' },
        { icon: 'edit', label: 'Description', value: "Well-maintained stroller in great condition. Comes with rain cover and storage bag." },
        { icon: 'pin', label: 'Pickup Location', value: 'Grünerløkka 15, 0550 Oslo' },
        { icon: 'shield', label: 'Availability', value: 'Available' },
      ],
    };
  }
}

</script>
</body>
</html>
