<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;">
      <div style="font-family:'Newsreader',serif;font-size:24px;">Saved Posts</div>
      <span style="font-size:12px;color:#8A7C6C;">All ▾</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:16px;">
      <sc-for list="{{ saved }}" as="s" hint-placeholder-count="4">
        <div style="display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:12px;">
          <div style="width:56px;height:56px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">{{ s.name }}</div>
            <div style="font-size:12px;color:#7C7062;">{{ s.text }}</div>
            <div style="font-size:11px;color:#8A7C6C;margin-top:2px;">Saved {{ s.time }}</div>
          </div>
          <span style="color:#8A7C6C;">⋯</span>
        </div>
      </sc-for>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      saved: [
        { name: 'Julie Hansen', text: 'Beautiful view from our hike today! ️', time: '2h ago' },
        { name: 'Martin Larsen', text: 'Homemade pizza night! The kids loved it.', time: '1d ago' },
        { name: 'Emma Andersen', text: 'Tips for a happy and healthy family lifestyle ', time: '3d ago' },
        { name: 'Kids Activities Oslo', text: 'DIY bird house project  Fun for the whole family!', time: '5d ago' },
      ],
    };
  }
}

</script>
</body>
</html>
