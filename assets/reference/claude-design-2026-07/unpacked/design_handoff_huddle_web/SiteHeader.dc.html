<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;">
  <div style="background:#3A342C;color:#EAD9C2;font-size:11px;letter-spacing:.03em;">
    <div style="max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:9px 40px;gap:16px;white-space:nowrap;">
      <div style="display:flex;gap:24px;align-items:center;">
        <div style="display:flex;align-items:center;gap:7px;"><dc-import name="Icon" icon-name="truck" color="#CE9A63" size="13" hint-size="13,13"></dc-import><span>Free local delivery over 899 NOK</span></div>
        <div style="display:flex;align-items:center;gap:7px;opacity:.92;"><dc-import name="Icon" icon-name="leaf" color="#CE9A63" size="12" hint-size="12,12"></dc-import><span>Sustainable choices for your family &amp; our planet</span></div>
      </div>
      <a href="Home.dc.html" style="color:#DA9E67;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px;flex-shrink:0;" style-hover="color:#EAB984;"><dc-import name="Icon" icon-name="sparkle" color="#DA9E67" size="12" hint-size="12,12"></dc-import>Download the Huddle app</a>
    </div>
  </div>

  <div style="background:#FCF9F3;border-bottom:1px solid #E7DAC7;">
    <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:24px;padding:15px 40px;">
      <a href="Home.dc.html" style="display:flex;align-items:center;flex-shrink:0;"><img src="assets/Huddle_wordmark.png" alt="Huddle" style="height:30px;width:auto;display:block;"></a>
      <div style="display:flex;align-items:center;gap:21px;flex:1;flex-wrap:nowrap;">
        <sc-for list="{{ navItems }}" as="n" hint-placeholder-count="8">
          <a href="{{ n.href }}" style="text-decoration:none;color:{{ n.color }};font-size:13px;font-weight:{{ n.weight }};border-bottom:2px solid {{ n.border }};padding-bottom:5px;white-space:nowrap;transition:color .15s;" style-hover="color:#9E5A2C;">{{ n.label }}</a>
        </sc-for>
      </div>
      <div style="display:flex;align-items:center;gap:8px;border:1px solid #DBC9B0;border-radius:22px;padding:8px 14px;color:#A99B89;font-size:12.5px;width:176px;background:#fff;flex-shrink:0;">
        <dc-import name="Icon" icon-name="search" color="#A99B89" size="14" hint-size="14,14"></dc-import><span>Search Huddle…</span>
      </div>
      <div style="width:1px;height:22px;background:#E7DAC7;flex-shrink:0;"></div>
      <div style="display:flex;align-items:center;gap:14px;font-size:12px;color:#5A5147;flex-shrink:0;">
        <span style="white-space:nowrap;letter-spacing:.02em;">EN / NOK</span>
        <a href="ParentDashboard.dc.html" style="display:flex;color:#5A5147;" style-hover="color:#9E5A2C;"><dc-import name="Icon" icon-name="user" color="#5A5147" size="17" hint-size="17,17"></dc-import></a>
        <a href="SavedItems.dc.html" style="display:flex;color:#5A5147;" style-hover="color:#9E5A2C;"><dc-import name="Icon" icon-name="heart" color="#5A5147" size="17" hint-size="17,17"></dc-import></a>
        <a href="Cart.dc.html" style="position:relative;display:flex;color:#5A5147;" style-hover="color:#9E5A2C;"><dc-import name="Icon" icon-name="bag" color="#5A5147" size="17" hint-size="17,17"></dc-import><span style="position:absolute;top:-6px;right:-7px;background:#BC7A45;color:#fff;font-size:9px;font-weight:700;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;">2</span></a>
      </div>
    </div>
  </div>

  <sc-if value="{{ hasBreadcrumb }}" hint-placeholder-val="{{ false }}">
    <div style="max-width:1280px;margin:0 auto;padding:12px 40px;font-size:12px;color:#A99B89;letter-spacing:.02em;"><a href="Home.dc.html" style="color:#A99B89;text-decoration:none;">Home</a> <span style="margin:0 7px;color:#DBC9B0;">/</span> <span style="color:#8A7C6C;">{{ breadcrumb }}</span></div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;shop&quot;, &quot;community&quot;, &quot;activities&quot;, &quot;events&quot;, &quot;services&quot;, &quot;stores&quot;, &quot;partners&quot;, &quot;about&quot;, &quot;&quot;]}, &quot;breadcrumb&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || '';
    const items = [
      { key: 'shop', label: 'Shop', href: 'Marketplace.dc.html' },
      { key: 'community', label: 'Community', href: 'Community.dc.html' },
      { key: 'activities', label: 'Activities', href: 'Activities.dc.html' },
      { key: 'events', label: 'Events', href: 'Events.dc.html' },
      { key: 'services', label: 'Services', href: 'ServicesHome.dc.html' },
      { key: 'stores', label: 'For Stores & Brands', href: 'PartnerStoresLanding.dc.html' },
      { key: 'partners', label: 'Partner Stores', href: 'PartnerLanding.dc.html' },
      { key: 'about', label: 'About Us', href: 'AboutUs.dc.html' },
    ];
    const navItems = items.map((it) => ({
      ...it,
      color: it.key === active ? '#9E5A2C' : '#5A5147',
      border: it.key === active ? '#9E5A2C' : 'transparent',
      weight: it.key === active ? 600 : 500,
    }));
    return {
      navItems,
      hasBreadcrumb: !!this.props.breadcrumb,
      breadcrumb: this.props.breadcrumb || '',
    };
  }
}
</script>
</body>
</html>
