<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import>
    <div style="max-width:480px;padding:32px 40px;">
      <a href="BuyerInquiries.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to Inquiries</a>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
        <div style="font-family:'Newsreader',serif;font-size:22px;">Reservation Details</div>
        <div style="font-size:11px;background:#EAEBE1;color:#6E7459;padding:5px 12px;border-radius:12px;">Reserved</div>
      </div>

      <div style="display:flex;align-items:center;gap:12px;margin-top:18px;">
        <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
        <div>
          <div style="font-size:14px;font-weight:600;">Emma Anderson</div>
          <div style="font-size:11px;color:#8A7C6C;">Member since Jan 2004 · 2 Children</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:14px;">
        <a href="Messages.dc.html" style="flex:1;text-decoration:none;text-align:center;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:20px;padding:11px;font-size:13px;"> Message</a>
        <a href="UserProfile.dc.html" style="flex:1;text-decoration:none;text-align:center;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:20px;padding:11px;font-size:13px;">View Profile</a>
      </div>

      <div style="font-size:12px;color:#8A7C6C;margin-top:20px;">Item</div>
      <div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:14px;margin-top:8px;">
        <div style="width:48px;height:48px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
        <div>
          <div style="font-size:13px;font-weight:600;">Stokke Trailz Stroller</div>
          <div style="font-size:12px;color:#7C7062;">NOK 2,500</div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;">
        <sc-for list="{{ info }}" as="i" hint-placeholder-count="4">
          <div style="display:flex;justify-content:space-between;font-size:13px;">
            <span style="color:#8A7C6C;">{{ i.label }}</span>
            <span style="font-weight:600;">{{ i.value }}</span>
          </div>
        </sc-for>
      </div>

      <a href="SellerPickupConfirmation.dc.html" style="display:block;text-align:center;text-decoration:none;background:#3A342C;color:#fff;border-radius:22px;padding:13px;font-size:14px;font-weight:600;margin-top:22px;">Confirm Pickup</a>
      <div style="text-align:center;border:1px solid #E3B4A8;color:#B0453A;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:10px;">Cancel Reservation</div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      info: [
        { label: 'Reserved on', value: 'May 26, 2025 at 10:24' },
        { label: 'Reservation expires', value: 'May 29, 2025 at 10:24' },
        { label: 'Pickup Location', value: 'Grünerløkka 15, 0550 Oslo' },
        { label: 'Payment Method', value: 'Cash on Pickup' },
      ],
    };
  }
}

</script>
</body>
</html>
