<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>
  <div style="max-width:560px;margin:0 auto;padding:32px 40px;">
    <a href="MyGroupsList.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to Groups</a>

    <div style="display:flex;align-items:center;gap:12px;margin-top:14px;">
      <div style="width:52px;height:52px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
      <div style="flex:1;">
        <div style="font-family:'Newsreader',serif;font-size:19px;">Oslo Runners Club</div>
        <div style="font-size:12px;color:#7C7062;">Public Group · 12 members</div>
      </div>
      <div style="font-size:12px;border:1px solid #6E7459;color:#6E7459;background:#EAEBE1;padding:6px 14px;border-radius:16px;">Joined</div>
    </div>

    <div style="display:flex;gap:26px;margin-top:18px;border-bottom:1px solid #DBC9B0;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="5">
        <div style="font-size:13px;padding-bottom:10px;color:{{ t.color }};border-bottom:2px solid {{ t.border }};">{{ t.label }}</div>
      </sc-for>
    </div>

    <div style="font-size:16px;font-weight:600;margin-top:20px;">Group Settings</div>
    <div style="display:flex;flex-direction:column;margin-top:14px;">
      <sc-for list="{{ settings }}" as="s" hint-placeholder-count="6">
        <div style="display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #DBC9B0;border-top:none;padding:14px;">
          <div style="font-size:16px;color:#BC7A45;">{{ s.icon }}</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">{{ s.title }}</div>
            <div style="font-size:11px;color:#8A7C6C;">{{ s.desc }}</div>
          </div>
          <span style="color:#8A7C6C;">›</span>
        </div>
      </sc-for>
    </div>
    <style>
    </style>
    <div style="text-align:center;border:1px solid #E3B4A8;color:#B0453A;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:20px;">Delete Group</div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'Feed', color: '#8A7C6C', border: 'transparent' },
        { label: 'Members', color: '#8A7C6C', border: 'transparent' },
        { label: 'Events', color: '#8A7C6C', border: 'transparent' },
        { label: 'About', color: '#8A7C6C', border: 'transparent' },
        { label: 'Settings', color: '#463F37', border: '#BC7A45' },
      ],
      settings: [
        { icon: '', title: 'Edit Group Info', desc: 'Update name, description, category' },
        { icon: '', title: 'Privacy Settings', desc: 'Manage group privacy and access' },
        { icon: '', title: 'Membership Settings', desc: 'Configure how people can join' },
        { icon: '', title: 'Manage Members', desc: 'Add or remove members and admins' },
        { icon: '', title: 'Group Rules', desc: 'Manage and update group rules' },
        { icon: '', title: 'Notifications', desc: 'Configure group notification settings' },
      ],
    };
  }
}

</script>
</body>
</html>
