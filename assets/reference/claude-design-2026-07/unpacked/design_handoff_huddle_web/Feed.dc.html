<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px;">
    <div style="display:flex;gap:10px;">
      <sc-for list="{{ filters }}" as="f" hint-placeholder-count="4">
        <div style="font-size:13px;padding:8px 18px;border-radius:18px;background:{{ f.bg }};color:{{ f.color }};">{{ f.label }}</div>
      </sc-for>
    </div>

    <a href="CreatePost.dc.html" style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:14px;margin-top:16px;text-decoration:none;color:#8A7C6C;">
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);flex-shrink:0;"></div>
      <span style="font-size:13px;">What's on your mind?</span>
    </a>

    <div style="display:flex;flex-direction:column;gap:14px;margin-top:16px;">
      <sc-for list="{{ posts }}" as="p" hint-placeholder-count="3">
        <a href="PostDetails.dc.html" style="text-decoration:none;color:#463F37;background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:16px;display:block;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);flex-shrink:0;"></div>
            <div style="flex:1;">
              <div style="font-size:13px;font-weight:600;">{{ p.name }}</div>
              <div style="font-size:11px;color:#8A7C6C;">{{ p.time }} · {{ p.location }}</div>
            </div>
            <span style="color:#8A7C6C;">⋯</span>
          </div>
          <div style="font-size:13px;margin-top:10px;">{{ p.text }}</div>
          <div style="height:180px;border-radius:10px;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);margin-top:10px;"></div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#8A7C6C;margin-top:10px;">
            <span>♡ {{ p.likes }}</span><span>{{ p.comments }} Comments</span><span>↗ Share</span>
          </div>
        </a>
      </sc-for>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      filters: [
        { label: 'For You', bg: '#3A342C', color: '#fff' },
        { label: 'Following', bg: '#fff', color: '#463F37' },
        { label: 'Groups', bg: '#fff', color: '#463F37' },
        { label: 'Events', bg: '#fff', color: '#463F37' },
      ],
      posts: [
        { name: 'Emma Andersen', time: '2h ago', location: 'Oslo, Norway', text: 'What a beautiful day for a family picnic in Frogner Park! ', likes: 28, comments: 6 },
        { name: 'Martin Larsen', time: '5h ago', location: 'Nordmarka', text: 'Sunset hike with the kids. Nature never fails to amaze us. ', likes: 41, comments: 9 },
        { name: 'Julie Hansen', time: '1d ago', location: 'Oslo, Norway', text: 'Homemade pizza night! The kids loved it. ', likes: 33, comments: 5 },
      ],
    };
  }
}

</script>
</body>
</html>
