<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px 60px;">
    <div style="display:flex;align-items:center;gap:4px;">
      <sc-for list="{{ dots }}" as="d" hint-placeholder-count="5">
        <div style="width:24px;height:24px;border-radius:50%;background:{{ d.bg }};color:{{ d.color }};font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <sc-if value="{{ d.done }}" hint-placeholder-val="{{ false }}"><dc-import name="Icon" icon-name="check" color="#fff" size="11" hint-size="11,11"></dc-import></sc-if>
          <sc-if value="{{ d.notDone }}" hint-placeholder-val="{{ true }}">{{ d.num }}</sc-if>
        </div>
        <sc-if value="{{ d.hasLine }}" hint-placeholder-val="{{ true }}"><div style="flex:1;height:1px;background:#DBC9B0;"></div></sc-if>
      </sc-for>
    </div>

    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-top:20px;">Step 3 of 5</div>
    <div style="font-family:'Newsreader',serif;font-size:25px;color:#3A342C;margin-top:4px;">Invite members</div>
    <div style="font-size:13px;color:#7C7062;margin-top:4px;">Add members to your group.</div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:24px 26px;margin-top:20px;box-shadow:0 12px 30px rgba(150,110,70,.08);">
      <div style="display:flex;gap:10px;">
        <div style="flex:1;border:1px solid #DBC9B0;border-radius:22px;padding:11px 16px;font-size:13.5px;color:#A99B89;background:#fff;display:flex;align-items:center;gap:8px;"><dc-import name="Icon" icon-name="search" color="#A99B89" size="14" hint-size="14,14"></dc-import>Search connections…</div>
        <div style="border:1px solid #DBC9B0;border-radius:22px;padding:11px 18px;font-size:13.5px;background:#fff;display:flex;align-items:center;gap:7px;font-weight:500;"><dc-import name="Icon" icon-name="filter" color="#463F37" size="14" hint-size="14,14"></dc-import>Filter</div>
      </div>

      <div style="font-size:13px;font-weight:600;color:#3A342C;margin-top:20px;margin-bottom:12px;">Suggested connections</div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <sc-for list="{{ suggestions }}" as="s" hint-placeholder-count="5">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,{{ s.c1 }},{{ s.c2 }});flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:15px;">{{ s.initial }}</div>
            <div style="flex:1;min-width:0;"><div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ s.name }}</div><div style="font-size:11px;color:#8A7C6C;">{{ s.mutual }} mutual connections</div></div>
            <div style="border:1px solid #DBC9B0;background:#fff;border-radius:18px;padding:7px 18px;font-size:12px;font-weight:600;color:#463F37;cursor:pointer;">Invite</div>
          </div>
        </sc-for>
      </div>

      <div style="font-size:12px;color:#7C7062;margin-top:20px;margin-bottom:6px;font-weight:600;">Share invite link</div>
      <div style="border:1px solid #DBC9B0;border-radius:12px;padding:12px 15px;font-size:13px;display:flex;justify-content:space-between;align-items:center;background:#fff;color:#463F37;">huddle.com/invite/oslo-runners <span style="color:#9E5A2C;font-weight:600;">Copy</span></div>
    </div>

    <div style="display:flex;gap:12px;margin-top:24px;">
      <a href="CreateGroupSettings.dc.html" style="flex:1;text-decoration:none;text-align:center;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:24px;padding:13px;font-size:13.5px;font-weight:500;">← Back</a>
      <a href="CreateGroupCoverDetails.dc.html" style="flex:1;text-decoration:none;text-align:center;background:#BC7A45;color:#fff;border-radius:24px;padding:13px;font-size:13.5px;font-weight:600;box-shadow:0 12px 26px rgba(188,122,69,.28);" style-hover="background:#A9663A;">Continue →</a>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      dots: [1, 2, 3, 4, 5].map((n) => ({ num: n, done: n <= 3, notDone: n > 3, bg: n <= 3 ? '#3A342C' : '#EFE4D4', color: n <= 3 ? '#fff' : '#463F37', hasLine: n < 5 })),
      suggestions: [
        { initial: 'E', name: 'Emma Andersen', mutual: 12, c1: '#C99A6B', c2: '#A9663A' },
        { initial: 'L', name: 'Liam Andersen', mutual: 8, c1: '#9BA184', c2: '#6E7459' },
        { initial: 'O', name: 'Olivia Hansen', mutual: 6, c1: '#D79A62', c2: '#B26A38' },
        { initial: 'N', name: 'Noah Johansen', mutual: 5, c1: '#C9A87E', c2: '#A97F4E' },
        { initial: 'S', name: 'Sofia Nilsen', mutual: 4, c1: '#A6AD8E', c2: '#7C8460' },
      ],
    };
  }
}
</script>
</body>
</html>
