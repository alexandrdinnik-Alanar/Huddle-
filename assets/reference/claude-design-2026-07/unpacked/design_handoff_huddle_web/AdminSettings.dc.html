<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;display:flex;align-items:flex-start;min-height:100vh;">
  <dc-import name="AdminSidebar" active="settings" hint-size="220px,100vh"></dc-import>
  <div style="flex:1;min-width:0;padding:32px 40px;max-width:820px;">
    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Admin</div>
    <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;">Platform settings</div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:22px 24px;margin-top:20px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
      <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;margin-bottom:6px;">General</div>
      <sc-for list="{{ general }}" as="s" hint-placeholder-count="4">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #F2E9DA;">
          <div><div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ s.title }}</div><div style="font-size:12px;color:#8A7C6C;margin-top:2px;">{{ s.desc }}</div></div>
          <div style="width:44px;height:25px;border-radius:14px;background:{{ s.trackBg }};position:relative;flex-shrink:0;"><span style="position:absolute;top:3px;{{ s.knobSide }}:3px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2);"></span></div>
        </div>
      </sc-for>
    </div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:22px 24px;margin-top:16px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
      <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;margin-bottom:6px;">Marketplace</div>
      <div style="font-size:12px;color:#7C7062;margin-bottom:6px;font-weight:600;margin-top:14px;">Default commission rate</div>
      <div style="border:1px solid #DBC9B0;border-radius:12px;padding:12px 15px;font-size:13.5px;display:flex;justify-content:space-between;background:#fff;font-weight:600;color:#3A342C;">7 <span style="color:#8A7C6C;font-weight:400;">%</span></div>
      <div style="font-size:12px;color:#7C7062;margin-top:14px;margin-bottom:6px;font-weight:600;">Listing auto-approval threshold</div>
      <div style="border:1px solid #DBC9B0;border-radius:12px;padding:12px 15px;font-size:13.5px;display:flex;justify-content:space-between;background:#fff;">Trusted sellers only <span style="color:#A99B89;">▾</span></div>
    </div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:22px 24px;margin-top:16px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
      <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;margin-bottom:6px;">Notifications</div>
      <sc-for list="{{ notifs }}" as="s" hint-placeholder-count="3">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #F2E9DA;">
          <div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ s.title }}</div>
          <div style="width:44px;height:25px;border-radius:14px;background:{{ s.trackBg }};position:relative;flex-shrink:0;"><span style="position:absolute;top:3px;{{ s.knobSide }}:3px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2);"></span></div>
        </div>
      </sc-for>
    </div>

    <div style="display:flex;gap:10px;margin-top:20px;">
      <div style="background:#BC7A45;color:#fff;border-radius:24px;padding:12px 24px;font-size:13.5px;font-weight:600;box-shadow:0 10px 22px rgba(188,122,69,.26);">Save changes</div>
      <div style="background:#fff;border:1px solid #DBC9B0;color:#463F37;border-radius:24px;padding:12px 24px;font-size:13.5px;">Cancel</div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const mkT = (title, desc, on) => ({ title, desc, trackBg: on ? '#BC7A45' : '#DBC9B0', knobSide: on ? 'right' : 'left' });
    return {
      general: [
        mkT('Maintenance mode', 'Temporarily disable public access for maintenance.', false),
        mkT('New sign-ups', 'Allow new families and partners to register.', true),
        mkT('Public search indexing', 'Allow search engines to index public pages.', true),
        mkT('Beta features', 'Enable experimental features for internal testing.', false),
      ],
      notifs: [
        mkT('New report alerts', ''),
        mkT('Daily digest email', ''),
        mkT('Weekly analytics summary', ''),
      ].map((n) => ({ ...n, trackBg: '#BC7A45', knobSide: 'right' })),
    };
  }
}
</script>
</body>
</html>
