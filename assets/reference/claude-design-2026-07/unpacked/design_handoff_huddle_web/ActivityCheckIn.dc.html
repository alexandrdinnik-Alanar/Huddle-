<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="activities" hint-size="100%,64px"></dc-import>
  <div style="max-width:420px;margin:0 auto;padding:32px 40px;">
    <div style="display:flex;gap:14px;">
      <div style="width:56px;height:56px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
      <div>
        <div style="font-family:'Newsreader',serif;font-size:20px;">Morning Community Run</div>
        <div style="font-size:12px;color:#7C7062;">Sun, Jun 8, 2025 · 7:00 AM – 9:00 AM</div>
        <div style="font-size:12px;color:#7C7062;">Akerselva Park, Oslo</div>
      </div>
    </div>

    <div style="display:flex;gap:26px;margin-top:20px;border-bottom:1px solid #DBC9B0;">
      <div style="font-size:13px;padding-bottom:10px;color:#463F37;border-bottom:2px solid #BC7A45;">QR Scanner</div>
      <div style="font-size:13px;padding-bottom:10px;color:#8A7C6C;">Manual Check-in</div>
    </div>

    <div style="position:relative;height:220px;border-radius:16px;background:#2E2A24;margin-top:20px;display:flex;align-items:center;justify-content:center;overflow:hidden;">
      <div style="width:140px;height:140px;background:repeating-conic-gradient(#463F37 0deg 8deg,#fff 8deg 16deg);border-radius:6px;"></div>
      <div style="position:absolute;left:20px;right:20px;top:50%;height:2px;background:#E0523A;"></div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-top:18px;">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;">Emma Anderson</div>
        <div style="font-size:11px;color:#8A7C6C;">emma.anderson@email.com</div>
        <div style="font-size:11px;color:#8A7C6C;">Check-in Time: 6:58 AM</div>
      </div>
      <div style="font-size:11px;background:#EAEBE1;color:#6E7459;padding:4px 10px;border-radius:12px;">Checked In</div>
    </div>

    <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:20px;">▤ Scan History</div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic { renderVals() { return {}; } }

</script>
</body>
</html>
