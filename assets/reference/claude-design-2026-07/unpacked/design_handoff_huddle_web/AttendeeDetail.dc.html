<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="events" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="events" hint-size="230px,600px"></dc-import>
    <div style="max-width:480px;padding:32px 40px;">
      <a href="OrganizerCheckInList.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to Event</a>
      <div style="font-family:'Newsreader',serif;font-size:22px;margin-top:14px;">Attendee Detail</div>

      <div style="display:flex;align-items:center;gap:12px;margin-top:18px;">
        <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
        <div>
          <div style="font-size:15px;font-weight:600;">Emma Anderson</div>
          <div style="font-size:12px;color:#8A7C6C;">emma.anderson@email.com</div>
          <div style="font-size:12px;color:#8A7C6C;">+47 987 65 432</div>
        </div>
      </div>
      <div style="font-size:11px;background:#EAEBE1;color:#6E7459;padding:4px 12px;border-radius:12px;display:inline-block;margin-top:10px;">Checked In</div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:18px;">
        <sc-for list="{{ info }}" as="i" hint-placeholder-count="4">
          <div style="display:flex;justify-content:space-between;font-size:13px;border-bottom:1px solid #EFE4D4;padding-bottom:8px;">
            <span style="color:#8A7C6C;">{{ i.label }}</span><span style="font-weight:600;">{{ i.value }}</span>
          </div>
        </sc-for>
      </div>

      <div style="font-size:13px;font-weight:600;margin-top:18px;">Additional Attendees</div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:10px;">
        <div style="width:34px;height:34px;border-radius:50%;background:#DBC9B0;flex-shrink:0;"></div>
        <div><div style="font-size:13px;font-weight:600;">Liam Anderson</div><div style="font-size:11px;color:#8A7C6C;">Child Ticket</div></div>
      </div>

      <div style="font-size:13px;font-weight:600;margin-top:18px;">Notes</div>
      <div style="font-size:12px;color:#7C7062;margin-top:6px;">Allergies: None<br/>Special needs: None</div>

      <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:20px;"> Message Attendee</div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      info: [
        { label: 'Ticket Type', value: 'Child Ticket' },
        { label: 'Order Number', value: '#EVT-2025-00048' },
        { label: 'Ticket ID', value: 'TCK-3847-2348' },
        { label: 'Registered On', value: 'May 20, 2025, 14:32' },
      ],
    };
  }
}

</script>
</body>
</html>
