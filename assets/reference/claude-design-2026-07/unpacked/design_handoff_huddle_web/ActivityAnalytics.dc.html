<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="activities" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px;">
    <div style="display:flex;gap:14px;">
      <div style="width:56px;height:56px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
      <div>
        <div style="font-family:'Newsreader',serif;font-size:20px;">Morning Community Run</div>
        <div style="font-size:12px;color:#7C7062;">Sun, Jun 8, 2025 · 7:00 AM – 9:00 AM</div>
        <div style="font-size:12px;color:#7C7062;">Akerselva Park, Oslo</div>
      </div>
    </div>

    <div style="display:flex;gap:26px;margin-top:20px;border-bottom:1px solid #DBC9B0;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
        <div style="font-size:13px;padding-bottom:10px;color:{{ t.color }};border-bottom:2px solid {{ t.border }};">{{ t.label }}</div>
      </sc-for>
    </div>

    <div style="font-size:13px;font-weight:600;margin-top:20px;">Key Metrics</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px;">
      <sc-for list="{{ metrics }}" as="m" hint-placeholder-count="4">
        <div style="background:#fff;border:1px solid #DBC9B0;border-radius:12px;padding:12px;text-align:center;">
          <div style="font-family:'Newsreader',serif;font-size:18px;">{{ m.value }}</div>
          <div style="font-size:10px;color:#8A7C6C;">{{ m.label }}</div>
        </div>
      </sc-for>
    </div>

    <div style="font-size:13px;font-weight:600;margin-top:22px;">Registrations Over Time</div>
    <svg viewBox="0 0 300 80" style="width:100%;height:100px;margin-top:10px;">
      <polyline points="0,70 40,60 80,55 120,40 160,35 200,25 240,15 300,10" fill="none" stroke="#6E7459" stroke-width="2"></polyline>
    </svg>

    <div style="font-size:13px;font-weight:600;margin-top:10px;">Registration Source</div>
    <div style="display:flex;align-items:center;gap:24px;margin-top:12px;">
      <div style="width:110px;height:110px;border-radius:50%;background:conic-gradient(#6E7459 0% 55.6%, #7BA6C4 55.6% 83.4%, #C9A46A 83.4% 100%);display:flex;align-items:center;justify-content:center;">
        <div style="width:64px;height:64px;border-radius:50%;background:#F6F0E8;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <div style="font-family:'Newsreader',serif;font-size:16px;">18</div><div style="font-size:9px;color:#8A7C6C;">Total</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;font-size:12px;">
        <sc-for list="{{ sources }}" as="s" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;gap:8px;"><span style="width:10px;height:10px;border-radius:50%;background:{{ s.color }};"></span>{{ s.label }}</div>
        </sc-for>
      </div>
    </div>

    <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:20px;">⬇ Download Report</div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'Overview', color: '#463F37', border: '#BC7A45' },
        { label: 'Engagement', color: '#8A7C6C', border: 'transparent' },
        { label: 'Attendance', color: '#8A7C6C', border: 'transparent' },
      ],
      metrics: [
        { value: '30', label: 'Capacity' },
        { value: '18', label: 'Registered' },
        { value: '12', label: 'Checked In' },
        { value: '80%', label: 'Attendance Rate' },
      ],
      sources: [
        { label: 'Huddle App 10 (55.6%)', color: '#6E7459' },
        { label: 'Shared Link 5 (27.8%)', color: '#7BA6C4' },
        { label: 'Social Media 3 (16.7%)', color: '#C9A46A' },
      ],
    };
  }
}

</script>
</body>
</html>
