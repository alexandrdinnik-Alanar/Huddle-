<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>

  <div style="max-width:640px;margin:0 auto;padding:32px 40px 60px;">
    <a href="Feed.dc.html" style="font-size:13px;color:#9E5A2C;text-decoration:none;font-weight:500;">← Back to feed</a>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:18px;margin-top:16px;box-shadow:0 12px 30px rgba(150,110,70,.08);">
      <div style="display:flex;align-items:center;gap:11px;">
        <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#C99A6B,#A9663A);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:16px;">E</div>
        <div style="flex:1;">
          <div style="font-size:13.5px;font-weight:600;color:#3A342C;">Emma Andersen</div>
          <div style="font-size:11px;color:#8A7C6C;display:flex;align-items:center;gap:5px;">2h ago · Oslo, Norway <dc-import name="Icon" icon-name="globe" color="#8A7C6C" size="11" hint-size="11,11"></dc-import></div>
        </div>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="#A99B89"><circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle></svg>
      </div>
      <div style="font-size:14.5px;margin-top:14px;line-height:1.55;color:#463F37;">What a beautiful day for a family picnic in Frogner Park!</div>
      <div style="height:240px;border-radius:14px;overflow:hidden;margin-top:14px;"><img src="https://d8j0ntlcm91z4.cloudfront.net/user_3FvCn7uBV4p4gvzj7gN7FkzdUf7/hf_20260721_144038_d8a1e095-5bd0-45c0-9f81-2b7c6fc54f21.png" alt="Family picnic in Frogner Park" style="width:100%;height:100%;object-fit:cover;"></div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;">
        <sc-for list="{{ thumbs }}" as="t" hint-placeholder-count="4">
          <div style="height:62px;border-radius:9px;background:linear-gradient(135deg,{{ t.c1 }},{{ t.c2 }});position:relative;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;">
            <sc-if value="{{ t.overlay }}" hint-placeholder-val="{{ false }}"><div style="position:absolute;inset:0;background:rgba(46,42,36,.5);border-radius:9px;display:flex;align-items:center;justify-content:center;">+3</div></sc-if>
          </div>
        </sc-for>
      </div>
      <div style="display:flex;align-items:center;gap:16px;font-size:12px;color:#8A7C6C;margin-top:14px;">
        <span style="display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="heart" color="#BC7A45" size="14" hint-size="14,14"></dc-import>28</span>
        <span>Liked by Julie Hansen and 27 others</span>
      </div>
    </div>

    <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;margin-top:22px;margin-bottom:12px;">Comments</div>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <sc-for list="{{ comments }}" as="c" hint-placeholder-count="3">
        <div style="display:flex;gap:11px;">
          <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,{{ c.c1 }},{{ c.c2 }});flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:13px;">{{ c.initial }}</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:#3A342C;">{{ c.name }}</div>
            <div style="font-size:13.5px;color:#463F37;margin-top:1px;">{{ c.text }}</div>
            <div style="font-size:11px;color:#8A7C6C;margin-top:3px;">{{ c.time }} · Like · Reply</div>
          </div>
        </div>
      </sc-for>
    </div>

    <div style="display:flex;gap:10px;align-items:center;margin-top:22px;">
      <div style="flex:1;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:11px 18px;font-size:13.5px;color:#A99B89;">Write a comment…</div>
      <div style="width:38px;height:38px;border-radius:50%;background:#BC7A45;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 8px 18px rgba(188,122,69,.28);"><dc-import name="Icon" icon-name="send" color="#fff" size="15" hint-size="15,15"></dc-import></div>
    </div>
  </div>

  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      thumbs: [
        { overlay: false, c1: '#9BA184', c2: '#6E7459' },
        { overlay: false, c1: '#D79A62', c2: '#B26A38' },
        { overlay: false, c1: '#C9A87E', c2: '#A97F4E' },
        { overlay: true, c1: '#A6AD8E', c2: '#7C8460' },
      ],
      comments: [
        { initial: 'J', name: 'Julie Hansen', text: 'Looks amazing! Wish we could join!', time: '1h ago', c1: '#C99A6B', c2: '#A9663A' },
        { initial: 'M', name: 'Martin Larsen', text: 'Frogner Park is the best for picnics.', time: '45m ago', c1: '#9BA184', c2: '#6E7459' },
      ],
    };
  }
}
</script>
</body>
</html>
