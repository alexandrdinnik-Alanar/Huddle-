<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="activities" hint-size="100%,64px"></dc-import>
  <div style="max-width:640px;margin:0 auto;padding:32px 40px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div style="font-family:'Newsreader',serif;font-size:24px;">My Activities</div>
        <div style="font-size:13px;color:#7C7062;margin-top:4px;">Manage all your activities in one place.</div>
      </div>
      <a href="CreateActivityBasicInfo.dc.html" style="text-decoration:none;border:1px solid #DBC9B0;background:#fff;color:#463F37;padding:10px 18px;border-radius:20px;font-size:13px;white-space:nowrap;">+ Create Activity</a>
    </div>

    <div style="display:flex;gap:26px;margin-top:20px;border-bottom:1px solid #DBC9B0;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
        <div style="font-size:13px;padding-bottom:10px;color:{{ t.color }};border-bottom:2px solid {{ t.border }};">{{ t.label }}</div>
      </sc-for>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;margin-top:16px;">
      <sc-for list="{{ activities }}" as="a" hint-placeholder-count="3">
        <a href="ActivityRegistrations.dc.html" style="display:flex;gap:14px;background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:14px;text-decoration:none;color:#463F37;">
          <div style="width:64px;height:64px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">{{ a.name }}</div>
            <div style="font-size:12px;color:#7C7062;">{{ a.date }}</div>
            <div style="font-size:12px;color:#7C7062;">{{ a.location }}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
              <div style="font-size:10px;background:#EFE4D4;color:#BC7A45;padding:3px 10px;border-radius:10px;">{{ a.status }}</div>
              <div style="font-size:11px;color:#8A7C6C;">{{ a.registered }}</div>
            </div>
          </div>
        </a>
      </sc-for>
    </div>

    <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:20px;">View All Activities</div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'Upcoming (3)', color: '#463F37', border: '#BC7A45' },
        { label: 'Past (2)', color: '#8A7C6C', border: 'transparent' },
        { label: 'Drafts (1)', color: '#8A7C6C', border: 'transparent' },
      ],
      activities: [
        { name: 'Morning Community Run', date: 'Sun, Jun 8, 2025 · 7:00 AM', location: 'Akerselva Park, Oslo', status: 'Upcoming', registered: '18 / 30 registered' },
        { name: 'Sunset Yoga Session', date: 'Tue, Jun 10, 2025 · 7:30 PM', location: 'Tjuvholmen, Oslo', status: 'Upcoming', registered: '12 / 20 registered' },
        { name: 'Community Clean-Up Day', date: 'Sat, Jun 14, 2025 · 10:00 AM', location: 'Gamlebyen, Oslo', status: 'Upcoming', registered: '25 / 50 registered' },
      ],
    };
  }
}

</script>
</body>
</html>
