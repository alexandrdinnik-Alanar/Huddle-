<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>

  <div style="max-width:760px;margin:0 auto;padding:32px 40px 60px;">
    <div style="display:flex;gap:10px;">
      <div style="flex:1;display:flex;align-items:center;gap:9px;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:11px 18px;font-size:13.5px;color:#463F37;cursor:pointer;"><dc-import name="Icon" icon-name="search" color="#A99B89" size="15" hint-size="15,15"></dc-import>picnic</div>
      <div style="display:flex;align-items:center;gap:8px;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:11px 18px;font-size:13.5px;font-weight:500;cursor:pointer;transition:border-color .15s;" style-hover="border-color:#BC7A45;"><dc-import name="Icon" icon-name="filter" color="#463F37" size="15" hint-size="15,15"></dc-import>Filter</div>
    </div>

    <div style="display:flex;gap:8px;margin-top:18px;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="5">
        <div style="font-size:13px;padding:9px 16px;border-radius:20px;background:{{ t.bg }};color:{{ t.color }};font-weight:{{ t.weight }};border:1px solid {{ t.border }};cursor:pointer;transition:border-color .15s;" style-hover="border-color:#BC7A45;">{{ t.label }}</div>
      </sc-for>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:26px;">
      <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;">Posts</div>
      <span style="font-size:12px;color:#A99B89;">{{ posts.length }} results</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">
      <sc-for list="{{ posts }}" as="p" hint-placeholder-count="3">
        <a href="PostDetails.dc.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;color:#463F37;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:12px 14px;box-shadow:0 6px 16px rgba(150,110,70,.05);transition:transform .16s;" style-hover="transform:translateY(-3px);">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,{{ p.c1 }},{{ p.c2 }});flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:15px;">{{ p.initial }}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ p.name }}</div>
            <div style="font-size:12px;color:#7C7062;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ p.text }}</div>
            <div style="font-size:10.5px;color:#A99B89;margin-top:2px;">{{ p.time }}</div>
          </div>
          <div style="width:46px;height:46px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,{{ p.tc1 }},{{ p.tc2 }});"></div>
        </a>
      </sc-for>
    </div>

    <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;margin-top:26px;margin-bottom:12px;">Groups</div>
    <a href="GroupFeed.dc.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;color:#463F37;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:14px;box-shadow:0 6px 16px rgba(150,110,70,.05);transition:transform .16s;" style-hover="transform:translateY(-3px);">
      <div style="width:46px;height:46px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#9BA184,#6E7459);display:flex;align-items:center;justify-content:center;"><dc-import name="Icon" icon-name="people" color="#fff" size="20" hint-size="20,20"></dc-import></div>
      <div><div style="font-size:14px;font-weight:600;color:#3A342C;">Picnic Lovers Oslo</div><div style="font-size:11.5px;color:#8A7C6C;">1.2K members</div></div>
    </a>
  </div>

  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'All', bg: '#3A342C', color: '#F6F0E8', border: '#3A342C', weight: 600 },
        { label: 'Posts', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'People', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'Groups', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'Events', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
      ],
      posts: [
        { initial: 'E', name: 'Emma Andersen', text: 'Family picnic in Frogner Park', time: '2h ago', c1: '#C99A6B', c2: '#A9663A', tc1: '#9BA184', tc2: '#6E7459' },
        { initial: 'M', name: 'Martin Larsen', text: 'Picnic vibes with the best people', time: '1d ago', c1: '#9BA184', c2: '#6E7459', tc1: '#D79A62', tc2: '#B26A38' },
        { initial: 'J', name: 'Julie Hansen', text: 'Picnic food ideas for kids', time: '3d ago', c1: '#D79A62', c2: '#B26A38', tc1: '#C9A87E', tc2: '#A97F4E' },
      ],
    };
  }
}
</script>
</body>
</html>
