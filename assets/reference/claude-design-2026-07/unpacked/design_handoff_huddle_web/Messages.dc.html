<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="" hint-size="100%,64px"></dc-import>

  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="messages" hint-size="230px,600px"></dc-import></div>

    <div style="flex:1;min-width:0;padding:32px 40px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;">
        <div>
          <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Inbox</div>
          <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;">Messages</div>
        </div>
        <div style="width:38px;height:38px;border-radius:50%;background:#F2E6D6;display:flex;align-items:center;justify-content:center;cursor:pointer;"><dc-import name="Icon" icon-name="edit" color="#9E5A2C" size="16" hint-size="16,16"></dc-import></div>
      </div>

      <div style="display:grid;grid-template-columns:300px 1fr;background:#fff;border:1px solid #EFE4D4;border-radius:18px;overflow:hidden;box-shadow:0 16px 40px rgba(150,110,70,.1);min-height:520px;">
        <div style="border-right:1px solid #EFE4D4;padding:16px;">
          <div style="display:flex;align-items:center;gap:8px;border:1px solid #DBC9B0;border-radius:20px;padding:9px 14px;font-size:12px;color:#A99B89;margin-bottom:14px;background:#fff;"><dc-import name="Icon" icon-name="search" color="#A99B89" size="13" hint-size="13,13"></dc-import>Search messages…</div>
          <sc-for list="{{ conversations }}" as="c" hint-placeholder-count="6">
            <div style="display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:12px;background:{{ c.bg }};margin-bottom:2px;cursor:pointer;">
              <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,{{ c.c1 }},{{ c.c2 }});flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:15px;">
                {{ c.initial }}
                <sc-if value="{{ c.online }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:#6E7459;border:2px solid #fff;"></span></sc-if>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:600;color:#3A342C;">{{ c.name }}</div>
                <div style="font-size:11px;color:#8A7C6C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ c.item }}</div>
              </div>
              <sc-if value="{{ c.unread }}" hint-placeholder-val="{{ false }}"><div style="width:8px;height:8px;border-radius:50%;background:#BC7A45;flex-shrink:0;"></div></sc-if>
            </div>
          </sc-for>
        </div>

        <div style="display:flex;flex-direction:column;">
          <div style="padding:16px 22px;border-bottom:1px solid #EFE4D4;display:flex;justify-content:space-between;align-items:center;">
            <div><div style="font-size:14.5px;font-weight:600;color:#3A342C;">Sofie L.</div><div style="font-size:11px;color:#6E7459;">Active now</div></div>
            <svg viewBox="0 0 24 24" width="17" height="17" fill="#A99B89"><circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle></svg>
          </div>
          <div style="padding:14px 22px;border-bottom:1px solid #EFE4D4;display:flex;align-items:center;gap:12px;">
            <div style="width:46px;height:46px;border-radius:11px;background:linear-gradient(135deg,#D79A62,#B26A38);"></div>
            <div><div style="font-size:12.5px;font-weight:600;color:#3A342C;">Stokke Tripp Trapp Chair</div><div style="font-size:12px;color:#9E5A2C;font-weight:600;">1 200 NOK</div></div>
          </div>
          <div style="flex:1;padding:22px;display:flex;flex-direction:column;gap:12px;">
            <sc-for list="{{ chat }}" as="m" hint-placeholder-count="5">
              <div style="display:flex;justify-content:{{ m.align }};">
                <div style="max-width:60%;background:{{ m.bg }};color:{{ m.color }};padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.4;">
                  {{ m.text }}
                  <div style="font-size:9.5px;opacity:.65;margin-top:5px;">{{ m.time }}</div>
                </div>
              </div>
            </sc-for>
          </div>
          <div style="padding:14px 22px;border-top:1px solid #EFE4D4;display:flex;gap:10px;align-items:center;">
            <div style="flex:1;border:1px solid #DBC9B0;border-radius:22px;padding:11px 18px;font-size:13.5px;color:#A99B89;background:#fff;">Type a message…</div>
            <div style="width:38px;height:38px;border-radius:50%;background:#BC7A45;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;box-shadow:0 8px 18px rgba(188,122,69,.28);"><dc-import name="Icon" icon-name="send" color="#fff" size="15" hint-size="15,15"></dc-import></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      conversations: [
        { initial: 'S', name: 'Sofie L.', item: 'Stokke Tripp Trapp Chair', online: true, unread: true, bg: '#FBF5EC', c1: '#C99A6B', c2: '#A9663A' },
        { initial: 'M', name: 'Markus H.', item: 'Baby Jacket', online: false, unread: false, bg: 'transparent', c1: '#9BA184', c2: '#6E7459' },
        { initial: 'A', name: 'Anna K.', item: 'Little Dutch Train', online: false, unread: false, bg: 'transparent', c1: '#D79A62', c2: '#B26A38' },
        { initial: 'E', name: 'Elona R.', item: 'Baby Björn Bouncer', online: false, unread: false, bg: 'transparent', c1: '#C9A87E', c2: '#A97F4E' },
        { initial: 'D', name: 'David P.', item: 'Play Kitchen', online: false, unread: false, bg: 'transparent', c1: '#A6AD8E', c2: '#7C8460' },
      ],
      chat: [
        { text: 'Hi! Is the chair still available?', align: 'flex-start', bg: '#F2E6D6', color: '#463F37', time: '10:02' },
        { text: 'Yes, it is!', align: 'flex-end', bg: '#3A342C', color: '#fff', time: '10:05' },
        { text: 'Great! Can we pick it up on Friday afternoon?', align: 'flex-start', bg: '#F2E6D6', color: '#463F37', time: '10:10' },
        { text: 'Sure, Friday works for me. What time?', align: 'flex-end', bg: '#3A342C', color: '#fff', time: '10:12' },
        { text: 'Around 3 PM?', align: 'flex-start', bg: '#F2E6D6', color: '#463F37', time: '10:15' },
      ],
    };
  }
}
</script>
</body>
</html>
