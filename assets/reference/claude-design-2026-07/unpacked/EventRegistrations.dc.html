<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="events" hint-size="100%,64px"></dc-import>
  <div style="max-width:820px;margin:0 auto;padding:32px 40px 60px;">
    <div style="display:flex;gap:16px;">
      <div style="width:68px;height:68px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,#D79A62,#B26A38);display:flex;align-items:center;justify-content:center;"><dc-import name="Icon" icon-name="calendar" color="#fff" size="26" hint-size="26,26"></dc-import></div>
      <div>
        <div style="font-family:'Newsreader',serif;font-size:22px;color:#3A342C;">Kids Yoga Workshop</div>
        <div style="font-size:12.5px;color:#8A7C6C;display:flex;align-items:center;gap:5px;margin-top:3px;"><dc-import name="Icon" icon-name="clock" color="#9E5A2C" size="12" hint-size="12,12"></dc-import>Sat, Jun 7, 2026 · 10:00–11:30 AM</div>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:22px;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
        <div style="font-size:13px;padding:9px 16px;border-radius:20px;background:{{ t.bg }};color:{{ t.color }};font-weight:{{ t.weight }};border:1px solid {{ t.border }};cursor:pointer;">{{ t.label }}</div>
      </sc-for>
    </div>

    <div style="display:flex;gap:10px;margin-top:18px;">
      <div style="flex:1;border:1px solid #DBC9B0;border-radius:22px;padding:10px 16px;font-size:13.5px;color:#A99B89;background:#fff;display:flex;align-items:center;gap:8px;"><dc-import name="Icon" icon-name="search" color="#A99B89" size="14" hint-size="14,14"></dc-import>Search registrants…</div>
      <div style="border:1px solid #DBC9B0;border-radius:22px;padding:10px 18px;font-size:13.5px;background:#fff;display:flex;align-items:center;gap:7px;font-weight:500;cursor:pointer;"><dc-import name="Icon" icon-name="filter" color="#463F37" size="14" hint-size="14,14"></dc-import>Filter</div>
    </div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;margin-top:16px;box-shadow:0 8px 20px rgba(150,110,70,.06);overflow:hidden;">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:8px;font-size:11px;color:#A99B89;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:12px 18px;border-bottom:1px solid #F2E9DA;">
        <div>Attendee</div><div>Ticket</div><div>Status</div><div>Registered on</div>
      </div>
      <sc-for list="{{ registrants }}" as="r" hint-placeholder-count="5">
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:8px;align-items:center;padding:12px 18px;border-bottom:1px solid #F2E9DA;font-size:13px;transition:background .15s;" style-hover="background:#FBF5EC;">
          <div style="display:flex;align-items:center;gap:10px;"><div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,{{ r.c1 }},{{ r.c2 }});flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:12px;">{{ r.initial }}</div><span style="color:#3A342C;font-weight:500;">{{ r.name }}</span></div>
          <div style="color:#7C7062;">{{ r.ticket }}</div>
          <div><span style="font-size:11px;font-weight:600;background:{{ r.badgeBg }};color:{{ r.badgeColor }};padding:4px 11px;border-radius:12px;">{{ r.status }}</span></div>
          <div style="color:#8A7C6C;font-size:12px;">{{ r.date }}</div>
        </div>
      </sc-for>
    </div>

    <div style="display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid #DBC9B0;background:#fff;border-radius:24px;padding:13px;font-size:13.5px;font-weight:500;margin-top:20px;cursor:pointer;transition:border-color .15s;" style-hover="border-color:#BC7A45;color:#9E5A2C;"><dc-import name="Icon" icon-name="signal" color="#9E5A2C" size="15" hint-size="15,15"></dc-import>Export list</div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'Overview', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'Registrations (42)', bg: '#3A342C', color: '#F6F0E8', border: '#3A342C', weight: 600 },
        { label: 'Check-ins (28)', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
      ],
      registrants: [
        { initial: 'E', name: 'Emma Andersen', ticket: 'Adult', status: 'Checked in', badgeBg: '#EAEBE1', badgeColor: '#6E7459', date: 'May 20, 10:15 AM', c1: '#C99A6B', c2: '#A9663A' },
        { initial: 'O', name: 'Olivia Hansen', ticket: 'Child', status: 'Checked in', badgeBg: '#EAEBE1', badgeColor: '#6E7459', date: 'May 20, 10:20 AM', c1: '#D79A62', c2: '#B26A38' },
        { initial: 'N', name: 'Noah Johansen', ticket: 'Child', status: 'Checked in', badgeBg: '#EAEBE1', badgeColor: '#6E7459', date: 'May 20, 10:22 AM', c1: '#C9A87E', c2: '#A97F4E' },
        { initial: 'S', name: 'Sofia Nilsen', ticket: 'Child', status: 'Pending', badgeBg: '#F2E6D6', badgeColor: '#9E5A2C', date: 'May 20, 11:05 AM', c1: '#A6AD8E', c2: '#7C8460' },
        { initial: 'L', name: 'Lucas Dahl', ticket: 'Adult', status: 'Pending', badgeBg: '#F2E6D6', badgeColor: '#9E5A2C', date: 'May 20, 11:10 AM', c1: '#9BA184', c2: '#6E7459' },
      ],
    };
  }
}
</script>
</body>
</html>
