<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="events" hint-size="100%,64px"></dc-import>
  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="events" hint-size="230px,600px"></dc-import></div>
    <div style="flex:1;min-width:0;max-width:520px;padding:32px 40px 60px;">
      <a href="OrganizerCheckInList.dc.html" style="font-size:13px;color:#9E5A2C;text-decoration:none;font-weight:500;">← Back to event</a>
      <div style="font-family:'Newsreader',serif;font-size:24px;color:#3A342C;margin-top:14px;">Attendee detail</div>

      <div style="display:flex;align-items:center;gap:14px;margin-top:18px;">
        <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#C99A6B,#A9663A);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:20px;">E</div>
        <div>
          <div style="font-size:15px;font-weight:600;color:#3A342C;">Emma Anderson</div>
          <div style="font-size:12px;color:#8A7C6C;">emma.anderson@email.com</div>
          <div style="font-size:12px;color:#8A7C6C;">+47 987 65 432</div>
        </div>
      </div>
      <div style="font-size:11px;background:#EAEBE1;color:#6E7459;padding:5px 13px;border-radius:14px;display:inline-block;margin-top:12px;font-weight:600;">Checked in</div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:14px 16px;box-shadow:0 6px 16px rgba(150,110,70,.05);">
        <sc-for list="{{ info }}" as="i" hint-placeholder-count="4">
          <div style="display:flex;justify-content:space-between;font-size:13px;border-bottom:1px solid #F2E9DA;padding-bottom:9px;">
            <span style="color:#8A7C6C;">{{ i.label }}</span><span style="font-weight:600;color:#3A342C;">{{ i.value }}</span>
          </div>
        </sc-for>
      </div>

      <div style="font-family:'Newsreader',serif;font-size:17px;color:#3A342C;margin-top:20px;">Additional attendees</div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:10px;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:12px 14px;">
        <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#9BA184,#6E7459);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:14px;">L</div>
        <div><div style="font-size:13px;font-weight:600;color:#3A342C;">Liam Anderson</div><div style="font-size:11px;color:#8A7C6C;">Child ticket</div></div>
      </div>

      <div style="font-family:'Newsreader',serif;font-size:17px;color:#3A342C;margin-top:20px;">Notes</div>
      <div style="font-size:12.5px;color:#7C7062;margin-top:6px;line-height:1.6;">Allergies: None<br>Special needs: None</div>

      <a href="Messages.dc.html" style="display:flex;align-items:center;justify-content:center;gap:8px;text-align:center;text-decoration:none;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:24px;padding:13px;font-size:13.5px;font-weight:500;margin-top:22px;transition:border-color .15s;" style-hover="border-color:#BC7A45;color:#9E5A2C;"><dc-import name="Icon" icon-name="mail" color="#9E5A2C" size="14" hint-size="14,14"></dc-import>Message attendee</a>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      info: [
        { label: 'Ticket type', value: 'Child ticket' },
        { label: 'Order number', value: '#EVT-2026-00048' },
        { label: 'Ticket ID', value: 'TCK-3847-2348' },
        { label: 'Registered on', value: 'May 20, 2026, 14:32' },
      ],
    };
  }
}
</script>
</body>
</html>
