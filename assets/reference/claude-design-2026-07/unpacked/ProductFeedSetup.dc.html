<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px 60px;">
    <div style="display:flex;align-items:center;gap:6px;">
      <sc-for list="{{ dots }}" as="d" hint-placeholder-count="5">
        <div style="width:24px;height:24px;border-radius:50%;background:{{ d.bg }};color:{{ d.color }};font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <sc-if value="{{ d.done }}" hint-placeholder-val="{{ false }}"><dc-import name="Icon" icon-name="check" color="#fff" size="11" hint-size="11,11"></dc-import></sc-if>
          <sc-if value="{{ d.notDone }}" hint-placeholder-val="{{ true }}">{{ d.num }}</sc-if>
        </div>
        <sc-if value="{{ d.hasLine }}" hint-placeholder-val="{{ true }}"><div style="flex:1;height:1px;background:#DBC9B0;"></div></sc-if>
      </sc-for>
    </div>

    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-top:20px;">Step 4 of 5</div>
    <div style="font-family:'Newsreader',serif;font-size:25px;color:#3A342C;margin-top:4px;">Product feed setup</div>
    <div style="font-size:13px;color:#7C7062;margin-top:4px;">Choose how you want to connect your product catalog.</div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:24px 26px;margin-top:20px;box-shadow:0 12px 30px rgba(150,110,70,.08);">
      <div style="display:flex;flex-direction:column;gap:10px;">
        <sc-for list="{{ methods }}" as="m" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;gap:14px;border:1px solid {{ m.border }};background:{{ m.bg }};border-radius:14px;padding:16px;cursor:pointer;">
            <div style="width:42px;height:42px;border-radius:11px;background:#F2E6D6;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="{{ m.icon }}" color="#BC7A45" size="19" hint-size="19,19"></dc-import></div>
            <div style="flex:1;"><div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ m.title }}</div><div style="font-size:11.5px;color:#8A7C6C;margin-top:1px;">{{ m.desc }}</div></div>
            <sc-if value="{{ m.selected }}" hint-placeholder-val="{{ false }}"><dc-import name="Icon" icon-name="check" color="#6E7459" size="17" hint-size="17,17"></dc-import></sc-if>
          </div>
        </sc-for>
      </div>

      <div style="display:flex;align-items:flex-start;gap:9px;background:#F2E6D6;border-radius:12px;padding:13px 15px;margin-top:16px;">
        <dc-import name="Icon" icon-name="check" color="#9E5A2C" size="14" hint-size="14,14"></dc-import>
        <div style="font-size:12px;color:#7C6A56;line-height:1.5;">You can change or update your feed method later in settings.</div>
      </div>
    </div>

    <div style="display:flex;gap:12px;margin-top:24px;">
      <a href="StoreProfileSetup.dc.html" style="flex:1;text-decoration:none;text-align:center;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:24px;padding:13px;font-size:13.5px;font-weight:500;transition:border-color .15s;" style-hover="border-color:#BC7A45;color:#9E5A2C;">← Back</a>
      <a href="UploadFeed.dc.html" style="flex:1;text-decoration:none;text-align:center;background:#BC7A45;color:#fff;border-radius:24px;padding:13px;font-size:13.5px;font-weight:600;box-shadow:0 12px 26px rgba(188,122,69,.28);" style-hover="background:#A9663A;">Continue →</a>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      dots: [1, 2, 3, 4, 5].map((n) => ({ num: n, done: n <= 4, notDone: n > 4, bg: n <= 4 ? '#3A342C' : '#EFE4D4', color: n <= 4 ? '#fff' : '#463F37', hasLine: n < 5 })),
      methods: [
        { icon: 'signal', title: 'Upload File (CSV / XML)', desc: 'Upload your product feed file manually.', border: '#BC7A45', bg: '#F2E6D6', selected: true },
        { icon: 'globe', title: 'API Connection', desc: 'Connect your store via API.', border: '#DBC9B0', bg: '#fff', selected: false },
        { icon: 'book', title: 'Google Sheets', desc: 'Connect your Google Sheet URL.', border: '#DBC9B0', bg: '#fff', selected: false },
      ],
    };
  }
}
</script>
</body>
</html>
