<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;min-height:100vh;background:#F6F0E8;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <div style="width:460px;border-radius:20px;background:#fff;box-shadow:0 20px 50px rgba(31,42,36,0.08);padding:36px 32px;">
    <div><img src="assets/Huddle_wordmark.png" alt="Huddle" style="height:26px;"></div>
    <div style="font-family:'Newsreader',serif;font-size:24px;color:#463F37;margin-top:20px;">How will you use Huddle?</div>
    <div style="font-size:13px;color:#7C7062;margin-top:6px;">This helps us personalize your experience.</div>

    <div style="display:flex;flex-direction:column;gap:10px;margin-top:22px;">
      <sc-for list="{{ roles }}" as="r" hint-placeholder-count="5">
        <a href="{{ r.href }}" style="display:flex;align-items:center;gap:14px;background:#F6F0E8;border-radius:14px;padding:16px;text-decoration:none;transition:background .15s;" style-hover="background:#F2E6D6;">
          <div style="width:42px;height:42px;border-radius:10px;background:{{ r.bg }};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="{{ r.icon }}" color="{{ r.color }}" size="19" hint-size="19,19"></dc-import></div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:600;color:#463F37;">{{ r.title }}</div>
            <div style="font-size:12px;color:#7C7062;margin-top:2px;">{{ r.desc }}</div>
          </div>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#A99B89" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
        </a>
      </sc-for>
    </div>
    <div style="text-align:center;font-size:12px;color:#8A7C6C;margin-top:20px;">You can change this later.</div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      roles: [
        { icon: 'people', bg: '#EAEBE1', color: '#6E7459', title: 'Parent / Family', desc: 'Find local activities, services, and connect with other families.', href: 'Onboarding.dc.html' },
        { icon: 'calendar', bg: '#F2E6D6', color: '#BC7A45', title: 'Organizer', desc: 'Create and manage events and activities.', href: 'PartnerOverview.dc.html' },
        { icon: 'bag', bg: '#EAEBE1', color: '#6E7459', title: 'Store / Business', desc: 'Sell products and reach local families.', href: 'StoreProfileSetup.dc.html' },
        { icon: 'handshake', bg: '#F2E6D6', color: '#BC7A45', title: 'Expert / Service Provider', desc: 'Offer services and connect with families.', href: 'PartnerOverview.dc.html' },
        { icon: 'home', bg: '#EAEBE1', color: '#6E7459', title: 'Municipality / Public Sector', desc: 'Access tools and manage community programs.', href: 'Municipality.dc.html' },
      ],
    };
  }
}

</script>
</body>
</html>
