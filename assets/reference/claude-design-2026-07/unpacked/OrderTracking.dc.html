<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import></div>
    <div style="flex:1;min-width:0;max-width:560px;padding:32px 40px 60px;">
      <a href="MyListings.dc.html" style="font-size:13px;color:#9E5A2C;text-decoration:none;font-weight:500;">← Back to orders</a>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
        <div style="font-family:'Newsreader',serif;font-size:22px;color:#3A342C;">Order #HDD-2026-00048</div>
        <div style="font-size:11px;background:#F2E6D6;color:#9E5A2C;padding:6px 13px;border-radius:14px;font-weight:600;">In transit</div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#7C7062;margin-top:14px;">
        <div><div>Estimated delivery</div><div style="font-weight:600;color:#463F37;margin-top:2px;">Jun 2 – Jun 4, 2026</div></div>
        <div style="text-align:right;"><div>Shipping to</div><div style="font-weight:600;color:#463F37;margin-top:2px;">Grünerløkka 15, 0550 Oslo</div></div>
      </div>

      <div style="font-family:'Newsreader',serif;font-size:18px;color:#3A342C;margin-top:24px;">Tracking progress</div>
      <div style="margin-top:14px;">
        <sc-for list="{{ steps }}" as="s" hint-placeholder-count="5">
          <div style="display:flex;gap:12px;">
            <div style="display:flex;flex-direction:column;align-items:center;">
              <div style="width:24px;height:24px;border-radius:50%;background:{{ s.bg }};color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <sc-if value="{{ s.done }}" hint-placeholder-val="{{ false }}"><dc-import name="Icon" icon-name="check" color="#fff" size="12" hint-size="12,12"></dc-import></sc-if>
              </div>
              <sc-if value="{{ s.hasLine }}" hint-placeholder-val="{{ true }}"><div style="width:2px;flex:1;background:#DBC9B0;min-height:24px;"></div></sc-if>
            </div>
            <div style="padding-bottom:20px;"><div style="font-size:13px;font-weight:600;color:{{ s.textColor }};">{{ s.label }}</div><div style="font-size:11px;color:#8A7C6C;">{{ s.date }}</div></div>
          </div>
        </sc-for>
      </div>

      <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:16px;margin-top:10px;box-shadow:0 6px 16px rgba(150,110,70,.05);">
        <div style="font-size:13px;font-weight:600;color:#3A342C;margin-bottom:10px;">Shipping details</div>
        <div style="display:flex;justify-content:space-between;font-size:12px;">
          <div><div style="color:#8A7C6C;">Carrier</div><div style="font-weight:600;color:#3A342C;margin-top:2px;">Posten Norge</div></div>
          <div style="text-align:right;"><div style="color:#8A7C6C;">Tracking number</div><div style="font-weight:600;color:#3A342C;margin-top:2px;display:flex;align-items:center;gap:5px;">PA123456789NO <dc-import name="Icon" icon-name="signal" color="#9E5A2C" size="11" hint-size="11,11"></dc-import></div></div>
        </div>
      </div>

      <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:24px;padding:13px;font-size:13.5px;font-weight:500;margin-top:20px;cursor:pointer;transition:border-color .15s;" style-hover="border-color:#BC7A45;color:#9E5A2C;">View order details</div>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      steps: [
        { done: true, bg: '#6E7459', label: 'Order confirmed', date: 'May 26, 2026, 10:34', textColor: '#463F37', hasLine: true },
        { done: true, bg: '#6E7459', label: 'Processing', date: 'May 26, 2026, 14:20', textColor: '#463F37', hasLine: true },
        { done: true, bg: '#BC7A45', label: 'Shipped', date: 'May 27, 2026, 09:15', textColor: '#463F37', hasLine: true },
        { done: false, bg: '#DBC9B0', label: 'Out for delivery', date: 'Expected Jun 2, 2026', textColor: '#8A7C6C', hasLine: true },
        { done: false, bg: '#DBC9B0', label: 'Delivered', date: 'Expected Jun 2 – Jun 4, 2026', textColor: '#8A7C6C', hasLine: false },
      ],
    };
  }
}
</script>
</body>
</html>
