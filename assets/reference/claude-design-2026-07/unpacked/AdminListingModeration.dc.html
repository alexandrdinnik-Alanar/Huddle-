<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="display:flex;font-family:'Hanken Grotesk',sans-serif;color:#463F37;background:#F6F0E8;min-height:100vh;">
  <dc-import name="AdminSidebar" active="listings" hint-size="220px,100%"></dc-import>
  <div style="flex:1;padding:32px 40px;">
    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Admin</div>
    <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;">Listing moderation</div>
    <div style="font-size:13px;color:#8A7C6C;margin-top:4px;">42 listings awaiting review</div>

    <div style="display:grid;gap:14px;margin-top:22px;">
      <sc-for list="{{ listings }}" as="l" hint-placeholder-count="4">
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:16px 20px;display:grid;grid-template-columns:64px 1.6fr 1fr 1fr auto;gap:16px;align-items:center;box-shadow:0 8px 20px rgba(150,110,70,.06);transition:transform .16s;" style-hover="transform:translateY(-3px);">
          <div style="width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,{{ l.c1 }},{{ l.c2 }});flex-shrink:0;"></div>
          <div>
            <div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ l.title }}</div>
            <div style="font-size:11px;color:#8A7C6C;margin-top:3px;">Seller: {{ l.seller }} · {{ l.category }}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#9E5A2C;font-weight:600;"><dc-import name="Icon" icon-name="flag" color="#9E5A2C" size="12" hint-size="12,12"></dc-import>{{ l.flag }}</div>
          <div style="font-size:13px;font-weight:700;color:#3A342C;">{{ l.price }}</div>
          <div style="display:flex;gap:8px;">
            <div style="border:1px solid #6E7459;color:#6E7459;border-radius:10px;padding:9px 15px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;" style-hover="background:#EAEBE1;">Approve</div>
            <div style="border:1px solid #B0462F;color:#B0462F;border-radius:10px;padding:9px 15px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;" style-hover="background:#F7E0D6;">Remove</div>
          </div>
        </div>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      listings: [
        { title: 'Vintage wooden stroller', seller: 'Julie Hansen', category: 'Nursery & Gear', flag: 'Suspicious price', price: '450 NOK', c1: '#D79A62', c2: '#B26A38' },
        { title: 'Kids winter jacket bundle (5x)', seller: 'Martin Larsen', category: 'Clothing', flag: 'Reported by user', price: '390 NOK', c1: '#9BA184', c2: '#6E7459' },
        { title: 'IKEA bunk bed with mattress', seller: 'Anders Berg', category: 'Nursery & Gear', flag: 'Missing photos', price: '1,200 NOK', c1: '#C9A87E', c2: '#A97F4E' },
        { title: 'Lego Duplo mega set', seller: 'Sara Vik', category: 'Toys & Games', flag: 'Duplicate listing', price: '280 NOK', c1: '#A6AD8E', c2: '#7C8460' },
      ],
    };
  }
}
</script>
</body>
</html>
