<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="display:flex;font-family:'Hanken Grotesk',sans-serif;color:#463F37;background:#F6F0E8;min-height:100vh;">
  <dc-import name="AdminSidebar" active="analytics" hint-size="220px,100%"></dc-import>
  <div style="flex:1;padding:32px 40px;">
    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Admin · Municipality</div>
    <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;">Municipality reports</div>
    <div style="font-size:13px;color:#8A7C6C;margin-top:4px;">Aggregate participation data shared with local partners</div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px;">
      <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
          <div style="font-size:11.5px;color:#8A7C6C;">{{ s.label }}</div>
          <div style="font-family:'Newsreader',serif;font-size:24px;margin-top:6px;color:#3A342C;">{{ s.value }}</div>
        </div>
      </sc-for>
    </div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;margin-top:22px;overflow:hidden;box-shadow:0 8px 20px rgba(150,110,70,.06);">
      <div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 90px;padding:12px 18px;font-size:11px;color:#A99B89;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #F2E9DA;">
        <div>Municipality</div><div>Reports shared</div><div>Last export</div><div>Cohort min. (k)</div><div></div>
      </div>
      <sc-for list="{{ munis }}" as="m" hint-placeholder-count="5">
        <div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 90px;padding:13px 18px;font-size:13px;align-items:center;border-bottom:1px solid #F2E9DA;transition:background .15s;" style-hover="background:#FBF5EC;">
          <div style="display:flex;align-items:center;gap:10px;"><div style="width:30px;height:30px;border-radius:9px;background:#EAEBE1;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="home" color="#6E7459" size="14" hint-size="14,14"></dc-import></div><span style="color:#3A342C;font-weight:500;">{{ m.name }}</span></div>
          <div style="color:#7C7062;">{{ m.count }}</div>
          <div style="color:#7C7062;">{{ m.last }}</div>
          <div style="color:#463F37;font-weight:600;">k ≥ {{ m.k }}</div>
          <a href="MunicipalityGovernance.dc.html" style="text-decoration:none;color:#9E5A2C;font-size:12.5px;font-weight:600;">View →</a>
        </div>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      stats: [
        { label: 'Partner municipalities', value: '4' },
        { label: 'Reports shared this year', value: '48' },
        { label: 'Avg. cohort size', value: '2,140' },
        { label: 'Data requests denied (< k)', value: '3' },
      ],
      munis: [
        { name: 'Oslo Kommune', count: 28, last: 'Jun 1, 2026', k: 10 },
        { name: 'Bergen Kommune', count: 9, last: 'May 15, 2026', k: 10 },
        { name: 'Trondheim Kommune', count: 6, last: 'Apr 30, 2026', k: 10 },
        { name: 'Stavanger Kommune', count: 5, last: 'Apr 22, 2026', k: 10 },
      ],
    };
  }
}
</script>
</body>
</html>
