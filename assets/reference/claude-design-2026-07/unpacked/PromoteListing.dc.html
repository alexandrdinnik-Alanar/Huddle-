<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import>
    <div style="max-width:480px;padding:32px 40px;">
      <a href="MyListings.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to My Listings</a>
      <div style="font-family:'Newsreader',serif;font-size:22px;margin-top:14px;">Promote Your Listing</div>
      <div style="font-size:13px;color:#7C7062;margin-top:4px;">Get more views and sell faster.</div>

      <div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:14px;margin-top:16px;">
        <div style="width:48px;height:48px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#EFE4D4,#DEC9AC);"></div>
        <div>
          <div style="font-size:13px;font-weight:600;">Stokke Trailz Stroller</div>
          <div style="font-size:12px;color:#7C7062;">NOK 2,500</div>
          <div style="font-size:11px;color:#6E7459;">Active</div>
        </div>
      </div>

      <div style="font-size:13px;font-weight:600;margin-top:20px;margin-bottom:10px;">Choose promotion plan</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <sc-for list="{{ plans }}" as="p" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;gap:12px;border:1px solid {{ p.border }};background:{{ p.bg }};border-radius:12px;padding:14px;">
            <div style="width:18px;height:18px;border-radius:50%;border:1px solid {{ p.dotBorder }};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <sc-if value="{{ p.selected }}" hint-placeholder-val="{{ false }}">
                <div style="width:10px;height:10px;border-radius:50%;background:#6E7459;"></div>
              </sc-if>
            </div>
            <div style="flex:1;">
              <div style="font-size:13px;font-weight:600;">{{ p.title }}</div>
              <div style="font-size:11px;color:#8A7C6C;">{{ p.desc }}</div>
            </div>
            <div style="font-size:13px;font-weight:600;">{{ p.price }}</div>
          </div>
        </sc-for>
      </div>

      <div style="background:#EFE4D4;border-radius:10px;padding:12px 14px;font-size:12px;color:#7C7062;margin-top:16px;">ⓘ Your listing will be highlighted and shown to more interested families.</div>

      <div style="text-align:center;background:#3A342C;color:#fff;border-radius:22px;padding:13px;font-size:14px;font-weight:600;margin-top:22px;">Continue to Payment</div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      plans: [
        { title: 'Boost for 3 days', desc: 'Get more visibility in search results.', price: 'NOK 49', border: '#6E7459', bg: '#EAEBE1', dotBorder: '#6E7459', selected: true },
        { title: 'Boost for 7 days', desc: 'Maximum exposure in your area.', price: 'NOK 79', border: '#DBC9B0', bg: '#fff', dotBorder: '#DBC9B0', selected: false },
        { title: 'Boost for 14 days', desc: 'Best chance to sell quickly.', price: 'NOK 129', border: '#DBC9B0', bg: '#fff', dotBorder: '#DBC9B0', selected: false },
      ],
    };
  }
}

</script>
</body>
</html>
