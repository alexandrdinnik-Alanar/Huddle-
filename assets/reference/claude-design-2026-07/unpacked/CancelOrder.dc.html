<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:grid;grid-template-columns:230px 1fr;">
    <dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import>
    <div style="max-width:520px;padding:32px 40px;">
      <a href="MyListings.dc.html" style="font-size:13px;color:#7C7062;text-decoration:none;">← Back to Orders</a>
      <div style="font-family:'Newsreader',serif;font-size:22px;margin-top:14px;">Cancel Order</div>

      <div style="background:#fff;border:1px solid #DBC9B0;border-radius:14px;padding:16px;margin-top:16px;">
        <div style="display:flex;justify-content:space-between;">
          <div style="font-size:13px;font-weight:600;">Order #HDD-2025-00048</div>
          <div style="font-size:11px;background:#EFE4D4;color:#BC7A45;padding:4px 10px;border-radius:12px;">Processing</div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#7C7062;margin-top:10px;">
          <div>Order Date</div><div style="color:#463F37;font-weight:600;">May 26, 2025</div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#7C7062;margin-top:6px;">
          <div>Total</div><div style="color:#463F37;font-weight:600;">NOK 2 998</div>
        </div>
      </div>

      <div style="font-size:13px;font-weight:600;margin-top:20px;margin-bottom:10px;">Why do you want to cancel?</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <sc-for list="{{ reasons }}" as="r" hint-placeholder-count="5">
          <div style="display:flex;align-items:center;gap:10px;font-size:13px;">
            <div style="width:16px;height:16px;border-radius:50%;border:1px solid {{ r.border }};display:flex;align-items:center;justify-content:center;">
              <sc-if value="{{ r.selected }}" hint-placeholder-val="{{ false }}">
                <div style="width:9px;height:9px;border-radius:50%;background:#3A342C;"></div>
              </sc-if>
            </div>
            {{ r.label }}
          </div>
        </sc-for>
      </div>

      <div style="background:#EFE4D4;border-radius:10px;padding:12px 14px;font-size:12px;color:#7C7062;margin-top:18px;">You can cancel within 2 hours after placing the order. After that, please contact the partner directly.</div>

      <div style="text-align:center;background:#3A342C;color:#fff;border-radius:22px;padding:13px;font-size:14px;font-weight:600;margin-top:22px;">Cancel Order</div>
      <div style="text-align:center;border:1px solid #DBC9B0;background:#fff;border-radius:22px;padding:13px;font-size:14px;margin-top:10px;">Go Back</div>
    </div>
  </div>
  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      reasons: [
        { label: 'Changed my mind', border: '#3A342C', selected: true },
        { label: 'Found a better price', border: '#DBC9B0', selected: false },
        { label: 'Ordered by mistake', border: '#DBC9B0', selected: false },
        { label: 'Delivery too slow', border: '#DBC9B0', selected: false },
        { label: 'Other reason', border: '#DBC9B0', selected: false },
      ],
    };
  }
}

</script>
</body>
</html>
