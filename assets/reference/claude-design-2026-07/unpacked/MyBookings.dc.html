<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="services" hint-size="100%,64px"></dc-import>

  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="services" hint-size="230px,600px"></dc-import></div>

    <div style="flex:1;min-width:0;padding:32px 40px;">
      <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Services</div>
      <div style="font-family:'Newsreader',serif;font-size:28px;color:#3A342C;margin-top:4px;">My bookings</div>

      <div style="display:flex;gap:8px;margin-top:22px;">
        <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
          <div style="font-size:13px;padding:9px 18px;border-radius:22px;background:{{ t.bg }};color:{{ t.color }};font-weight:{{ t.weight }};border:1px solid {{ t.border }};cursor:pointer;">{{ t.label }}</div>
        </sc-for>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;margin-top:18px;">
        <sc-for list="{{ bookings }}" as="b" hint-placeholder-count="3">
          <a href="BookingReschedule.dc.html" style="display:flex;gap:16px;background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:16px;text-decoration:none;color:#463F37;align-items:center;box-shadow:0 8px 20px rgba(150,110,70,.06);transition:transform .16s;" style-hover="transform:translateY(-3px);">
            <div style="width:56px;height:56px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,{{ b.c1 }},{{ b.c2 }});display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;">
              <div style="font-family:'Newsreader',serif;font-size:19px;line-height:1;">{{ b.day }}</div>
              <div style="font-size:9px;letter-spacing:.06em;font-weight:700;margin-top:2px;">{{ b.mon }}</div>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:600;color:#3A342C;">{{ b.name }}</div>
              <div style="font-size:11.5px;color:#8A7C6C;margin-top:1px;">{{ b.category }} · {{ b.provider }}</div>
              <div style="font-size:11.5px;color:#9E5A2C;margin-top:2px;display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="clock" color="#9E5A2C" size="12" hint-size="12,12"></dc-import>{{ b.date }} at {{ b.time }}</div>
            </div>
            <div style="font-size:11px;background:#EAEBE1;color:#6E7459;padding:5px 13px;border-radius:14px;font-weight:600;flex-shrink:0;">{{ b.status }}</div>
          </a>
        </sc-for>
      </div>
    </div>
  </div>

  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'Upcoming', bg: '#3A342C', color: '#F6F0E8', border: '#3A342C', weight: 600 },
        { label: 'Past', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'Canceled', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
      ],
      bookings: [
        { name: 'Bright Minds Center', category: 'Family Counseling', date: 'May 24, 2026', time: '10:00', provider: 'Dr. Anna Larsen', status: 'Upcoming', day: '24', mon: 'MAY', c1: '#D79A62', c2: '#B26A38' },
        { name: 'Active Life Physiotherapy', category: 'Physiotherapy', date: 'May 30, 2026', time: '14:00', provider: 'Thomas Eriksen', status: 'Upcoming', day: '30', mon: 'MAY', c1: '#9BA184', c2: '#6E7459' },
        { name: 'Oslo Children Clinic', category: 'Pediatric Care', date: 'Jun 5, 2026', time: '09:30', provider: 'Dr. Sara Nilsen', status: 'Upcoming', day: '05', mon: 'JUN', c1: '#C9A87E', c2: '#A97F4E' },
      ],
    };
  }
}
</script>
</body>
</html>
