<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#FCF9F3;border-bottom:1px solid #E7DAC7;">
  <div style="max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:24px;padding:14px 40px;">
    <a href="ParentDashboard.dc.html" style="display:flex;align-items:center;flex-shrink:0;"><img src="assets/Huddle_wordmark.png" alt="Huddle" style="height:28px;width:auto;display:block;"></a>
    <div style="display:flex;align-items:center;gap:22px;flex:1;flex-wrap:nowrap;">
      <sc-for list="{{ navItems }}" as="n" hint-placeholder-count="5">
        <a href="{{ n.href }}" style="text-decoration:none;color:{{ n.color }};font-size:13.5px;font-weight:{{ n.weight }};border-bottom:2px solid {{ n.border }};padding-bottom:5px;white-space:nowrap;" style-hover="color:#9E5A2C;">{{ n.label }}</a>
      </sc-for>
    </div>
    <div style="display:flex;align-items:center;gap:8px;border:1px solid #DBC9B0;border-radius:22px;padding:8px 14px;color:#A99B89;font-size:12.5px;width:170px;background:#fff;flex-shrink:0;">
      <dc-import name="Icon" icon-name="search" color="#A99B89" size="14" hint-size="14,14"></dc-import><span>Search…</span>
    </div>
    <div style="display:flex;align-items:center;gap:15px;flex-shrink:0;">
      <a href="Messages.dc.html" style="display:flex;color:#5A5147;" style-hover="color:#9E5A2C;"><dc-import name="Icon" icon-name="mail" color="#5A5147" size="18" hint-size="18,18"></dc-import></a>
      <a href="SavedItems.dc.html" style="display:flex;color:#5A5147;" style-hover="color:#9E5A2C;"><dc-import name="Icon" icon-name="heart" color="#5A5147" size="18" hint-size="18,18"></dc-import></a>
      <a href="MyListings.dc.html" style="display:flex;color:#5A5147;" style-hover="color:#9E5A2C;"><dc-import name="Icon" icon-name="bag" color="#5A5147" size="18" hint-size="18,18"></dc-import></a>
      <a href="ParentDashboard.dc.html" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#C99A6B,#A9663A);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12.5px;font-weight:700;text-decoration:none;">E</a>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;marketplace&quot;, &quot;activities&quot;, &quot;events&quot;, &quot;community&quot;, &quot;services&quot;, &quot;&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || '';
    const items = [
      { key: 'marketplace', label: 'Marketplace', href: 'Marketplace.dc.html' },
      { key: 'activities', label: 'Activities', href: 'Activities.dc.html' },
      { key: 'events', label: 'Events', href: 'Events.dc.html' },
      { key: 'community', label: 'Community', href: 'Community.dc.html' },
      { key: 'services', label: 'Services', href: 'ServicesHome.dc.html' },
    ];
    const navItems = items.map((it) => ({
      ...it,
      color: it.key === active ? '#9E5A2C' : '#5A5147',
      border: it.key === active ? '#9E5A2C' : 'transparent',
      weight: it.key === active ? 600 : 500,
    }));
    return { navItems };
  }
}
</script>
</body>
</html>
