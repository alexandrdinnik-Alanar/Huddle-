<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="community" hint-size="100%,64px"></dc-import>
  <div style="max-width:600px;margin:0 auto;padding:32px 40px 60px;">
    <a href="MyGroupsList.dc.html" style="font-size:13px;color:#9E5A2C;text-decoration:none;font-weight:500;">← Back to groups</a>

    <div style="display:flex;align-items:center;gap:14px;margin-top:16px;">
      <div style="width:56px;height:56px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,#9BA184,#6E7459);display:flex;align-items:center;justify-content:center;"><dc-import name="Icon" icon-name="people" color="#fff" size="24" hint-size="24,24"></dc-import></div>
      <div style="flex:1;">
        <div style="font-family:'Newsreader',serif;font-size:20px;color:#3A342C;">Oslo Runners Club</div>
        <div style="font-size:12px;color:#8A7C6C;">Public group · 12 members</div>
      </div>
      <div style="font-size:12px;border:1px solid #DBC9B0;color:#6E7459;background:#EAEBE1;padding:7px 16px;border-radius:18px;font-weight:600;cursor:pointer;">Joined</div>
    </div>

    <div style="display:flex;gap:8px;margin-top:20px;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
        <div style="font-size:13px;padding:9px 16px;border-radius:20px;background:{{ t.bg }};color:{{ t.color }};font-weight:{{ t.weight }};border:1px solid {{ t.border }};cursor:pointer;">{{ t.label }}</div>
      </sc-for>
    </div>

    <a href="CreatePost.dc.html" style="display:block;background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:15px;margin-top:18px;text-decoration:none;color:#463F37;box-shadow:0 8px 20px rgba(150,110,70,.06);transition:border-color .15s;" style-hover="border-color:#BC7A45;">
      <div style="border:1px solid #DBC9B0;border-radius:20px;padding:11px 16px;font-size:13.5px;color:#A99B89;background:#fff;">Share something with the group…</div>
      <div style="display:flex;gap:22px;margin-top:12px;font-size:12.5px;color:#7C7062;">
        <span style="display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="camera" color="#9E5A2C" size="14" hint-size="14,14"></dc-import>Photo</span>
        <span style="display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="chart" color="#9E5A2C" size="14" hint-size="14,14"></dc-import>Poll</span>
        <span style="display:flex;align-items:center;gap:5px;"><dc-import name="Icon" icon-name="calendar" color="#9E5A2C" size="14" hint-size="14,14"></dc-import>Event</span>
      </div>
    </a>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:16px;margin-top:16px;box-shadow:0 8px 20px rgba(150,110,70,.06);">
      <div style="display:flex;align-items:center;gap:11px;">
        <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#C99A6B,#A9663A);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:15px;">E</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13.5px;font-weight:600;color:#3A342C;">Emma Andersen <span style="font-size:10px;background:#EAEBE1;color:#6E7459;padding:2px 9px;border-radius:10px;font-weight:600;margin-left:2px;">Admin</span></div>
          <div style="font-size:11px;color:#8A7C6C;">May 28, 10:15 AM</div>
        </div>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="#A99B89"><circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle></svg>
      </div>
      <div style="font-size:13.5px;color:#463F37;margin-top:11px;line-height:1.5;">Great morning run today! Thanks to everyone who joined. See you next Saturday!</div>
      <div style="height:180px;border-radius:12px;overflow:hidden;margin-top:11px;"><img src="https://d8j0ntlcm91z4.cloudfront.net/user_3FvCn7uBV4p4gvzj7gN7FkzdUf7/hf_20260721_073622_8a8aa0da-8eb3-4e55-a77c-ae9a199f2b7b.png" alt="Morning run" style="width:100%;height:100%;object-fit:cover;"></div>
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#8A7C6C;margin-top:12px;">
        <dc-import name="Icon" icon-name="heart" color="#BC7A45" size="13" hint-size="13,13"></dc-import><span>24</span><span style="margin-left:8px;">6 comments</span>
      </div>
      <div style="display:flex;gap:20px;margin-top:11px;border-top:1px solid #F2E9DA;padding-top:11px;font-size:12.5px;color:#7C7062;">
        <span style="display:flex;align-items:center;gap:6px;cursor:pointer;"><dc-import name="Icon" icon-name="heart" color="#7C7062" size="14" hint-size="14,14"></dc-import>Like</span>
        <span style="display:flex;align-items:center;gap:6px;cursor:pointer;"><dc-import name="Icon" icon-name="chat" color="#7C7062" size="14" hint-size="14,14"></dc-import>Comment</span>
        <span style="display:flex;align-items:center;gap:6px;cursor:pointer;"><dc-import name="Icon" icon-name="signal" color="#7C7062" size="14" hint-size="14,14"></dc-import>Share</span>
      </div>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      tabs: [
        { label: 'Feed', bg: '#3A342C', color: '#F6F0E8', border: '#3A342C', weight: 600 },
        { label: 'Members', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'Events', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
        { label: 'About', bg: '#fff', color: '#463F37', border: '#DBC9B0', weight: 500 },
      ],
    };
  }
}
</script>
</body>
</html>
