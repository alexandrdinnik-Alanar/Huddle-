<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="marketplace" hint-size="100%,64px"></dc-import>
  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="marketplace" hint-size="230px,600px"></dc-import></div>
    <div style="flex:1;min-width:0;max-width:520px;padding:32px 40px 60px;">
      <a href="BuyerInquiries.dc.html" style="font-size:13px;color:#9E5A2C;text-decoration:none;font-weight:500;">← Back to inquiries</a>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
        <div style="font-family:'Newsreader',serif;font-size:24px;color:#3A342C;">Reservation details</div>
        <div style="font-size:11px;background:#EAEBE1;color:#6E7459;padding:6px 13px;border-radius:14px;font-weight:600;">Reserved</div>
      </div>

      <div style="display:flex;align-items:center;gap:14px;margin-top:18px;">
        <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#C99A6B,#A9663A);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Newsreader',serif;font-size:19px;">E</div>
        <div><div style="font-size:14px;font-weight:600;color:#3A342C;">Emma Anderson</div><div style="font-size:11.5px;color:#8A7C6C;">Member since Jan 2024 · 2 children</div></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:14px;">
        <a href="Messages.dc.html" style="flex:1;text-decoration:none;text-align:center;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:20px;padding:11px;font-size:13px;font-weight:500;transition:border-color .15s;" style-hover="border-color:#BC7A45;color:#9E5A2C;">Message</a>
        <a href="UserProfile.dc.html" style="flex:1;text-decoration:none;text-align:center;border:1px solid #DBC9B0;background:#fff;color:#463F37;border-radius:20px;padding:11px;font-size:13px;font-weight:500;transition:border-color .15s;" style-hover="border-color:#BC7A45;color:#9E5A2C;">View profile</a>
      </div>

      <div style="font-size:11.5px;color:#8A7C6C;margin-top:20px;font-weight:600;">Item</div>
      <div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:14px;margin-top:8px;box-shadow:0 6px 16px rgba(150,110,70,.05);">
        <div style="width:48px;height:48px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#D79A62,#B26A38);"></div>
        <div><div style="font-size:13px;font-weight:600;color:#3A342C;">Stokke Trailz Stroller</div><div style="font-size:12px;color:#7C7062;">NOK 2 500</div></div>
      </div>

      <div style="display:flex;flex-direction:column;gap:9px;margin-top:16px;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:14px 16px;">
        <sc-for list="{{ info }}" as="i" hint-placeholder-count="4">
          <div style="display:flex;justify-content:space-between;font-size:13px;border-bottom:1px solid #F2E9DA;padding-bottom:9px;"><span style="color:#8A7C6C;">{{ i.label }}</span><span style="font-weight:600;color:#3A342C;">{{ i.value }}</span></div>
        </sc-for>
      </div>

      <a href="SellerPickupConfirmation.dc.html" style="display:block;text-align:center;text-decoration:none;background:#BC7A45;color:#fff;border-radius:24px;padding:14px;font-size:14px;font-weight:600;margin-top:22px;box-shadow:0 12px 26px rgba(188,122,69,.28);" style-hover="background:#A9663A;">Confirm pickup</a>
      <div style="text-align:center;border:1px solid #E5B8A8;color:#B0462F;background:#fff;border-radius:24px;padding:13px;font-size:13.5px;font-weight:600;margin-top:10px;cursor:pointer;transition:background .15s;" style-hover="background:#F7E0D6;">Cancel reservation</div>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      info: [
        { label: 'Reserved on', value: 'May 26, 2026 at 10:24' },
        { label: 'Reservation expires', value: 'May 29, 2026 at 10:24' },
        { label: 'Pickup location', value: 'Grünerløkka 15, 0550 Oslo' },
        { label: 'Payment method', value: 'Cash on pickup' },
      ],
    };
  }
}
</script>
</body>
</html>
