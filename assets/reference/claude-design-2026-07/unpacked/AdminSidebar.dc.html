<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;padding:22px 14px;background:#2A251F;min-height:100vh;box-sizing:border-box;width:220px;">
  <div style="display:flex;align-items:center;gap:9px;padding:2px 10px 22px;">
    <img src="assets/Huddle_icon.png" alt="" style="width:28px;height:28px;">
    <span style="color:#EFE4D4;font-size:15px;font-weight:600;font-family:'Newsreader',serif;">Huddle Admin</span>
  </div>
  <sc-for list="{{ items }}" as="n" hint-placeholder-count="10">
    <a href="{{ n.href }}" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;background:{{ n.bg }};color:{{ n.color }};font-size:13px;font-weight:{{ n.weight }};margin-bottom:2px;text-decoration:none;transition:background .15s;" style-hover="background:rgba(206,154,99,.12);">
      <dc-import name="Icon" icon-name="{{ n.icon }}" color="{{ n.color }}" size="15" hint-size="15,15"></dc-import><span>{{ n.label }}</span>
    </a>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;dashboard&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;dashboard&quot;, &quot;users&quot;, &quot;listings&quot;, &quot;events&quot;, &quot;reports&quot;, &quot;appeals&quot;, &quot;audit&quot;, &quot;finance&quot;, &quot;analytics&quot;, &quot;settings&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || '';
    const all = [
      { key: 'dashboard', icon: 'home', label: 'Dashboard', href: 'AdminDashboard.dc.html' },
      { key: 'users', icon: 'user', label: 'Users', href: 'AdminUsers.dc.html' },
      { key: 'listings', icon: 'tag', label: 'Listing Moderation', href: 'AdminListingModeration.dc.html' },
      { key: 'events', icon: 'calendar', label: 'Event Administration', href: 'AdminEventAdministration.dc.html' },
      { key: 'reports', icon: 'flag', label: 'Reports Queue', href: 'AdminReportsQueue.dc.html' },
      { key: 'appeals', icon: 'check', label: 'Appeals', href: 'AdminAppeals.dc.html' },
      { key: 'audit', icon: 'clock', label: 'Audit Log', href: 'AdminAuditLog.dc.html' },
      { key: 'finance', icon: 'coin', label: 'Finance', href: 'AdminFinanceCommissions.dc.html' },
      { key: 'analytics', icon: 'chart', label: 'Analytics', href: 'AdminAnalytics.dc.html' },
      { key: 'privacy', icon: 'lock', label: 'Privacy Governance', href: 'AdminPrivacyGovernance.dc.html' },
      { key: 'settings', icon: 'gear', label: 'Platform Settings', href: 'AdminSettings.dc.html' },
    ];
    const items = all.map((n) => ({
      ...n,
      bg: n.key === active ? 'rgba(206,154,99,0.18)' : 'transparent',
      color: n.key === active ? '#E0A867' : '#B7A890',
      weight: n.key === active ? 600 : 500,
    }));
    return { items };
  }
}
</script>
</body>
</html>
