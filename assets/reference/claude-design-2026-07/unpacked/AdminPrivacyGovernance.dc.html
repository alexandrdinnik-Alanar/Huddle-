<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;display:flex;align-items:flex-start;min-height:100vh;">
  <dc-import name="AdminSidebar" active="settings" hint-size="220px,100vh"></dc-import>
  <div style="flex:1;min-width:0;padding:32px 40px;">
    <div style="color:#9E5A2C;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;">Trust &amp; Safety</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;">
      <div style="font-family:'Newsreader',serif;font-size:30px;color:#3A342C;margin-top:4px;">Privacy governance</div>
      <div style="font-size:12px;color:#6E7459;background:#EAEBE1;border-radius:16px;padding:6px 13px;font-weight:600;display:flex;align-items:center;gap:7px;"><dc-import name="Icon" icon-name="lock" color="#6E7459" size="14" hint-size="14,14"></dc-import>GDPR compliant</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:22px;">
      <sc-for list="{{ stats }}" as="s" hint-placeholder-count="4">
        <div style="background:#fff;border:1px solid #EFE4D4;border-radius:16px;padding:18px;box-shadow:0 8px 22px rgba(150,110,70,.06);">
          <div style="font-family:'Newsreader',serif;font-size:28px;color:{{ s.color }};">{{ s.value }}</div>
          <div style="font-size:12px;color:#8A7C6C;margin-top:4px;">{{ s.label }}</div>
        </div>
      </sc-for>
    </div>

    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-top:22px;align-items:start;">
      <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:22px 24px;box-shadow:0 8px 22px rgba(150,110,70,.06);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;"><div style="font-family:'Newsreader',serif;font-size:20px;color:#3A342C;">Data subject requests</div><span style="font-size:12px;color:#9E5A2C;font-weight:600;">View all →</span></div>
        <sc-for list="{{ dsar }}" as="d" hint-placeholder-count="4">
          <div style="display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid #F2E9DA;">
            <div style="width:38px;height:38px;border-radius:10px;background:{{ d.bg }};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><dc-import name="Icon" icon-name="{{ d.icon }}" color="{{ d.color }}" size="16" hint-size="16,16"></dc-import></div>
            <div style="flex:1;"><div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ d.type }}</div><div style="font-size:11.5px;color:#8A7C6C;">{{ d.ref }} · {{ d.age }}</div></div>
            <span style="font-size:11px;font-weight:700;color:{{ d.color }};background:{{ d.bg }};border-radius:14px;padding:4px 11px;">{{ d.status }}</span>
          </div>
        </sc-for>
      </div>
      <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:22px 24px;box-shadow:0 8px 22px rgba(150,110,70,.06);">
        <div style="font-family:'Newsreader',serif;font-size:20px;color:#3A342C;margin-bottom:6px;">Retention policies</div>
        <sc-for list="{{ retention }}" as="r" hint-placeholder-count="4">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F2E9DA;">
            <div style="font-size:13px;color:#463F37;">{{ r.data }}</div>
            <div style="font-size:12.5px;font-weight:600;color:#9E5A2C;">{{ r.period }}</div>
          </div>
        </sc-for>
      </div>
    </div>

    <div style="background:#fff;border:1px solid #EFE4D4;border-radius:18px;padding:22px 24px;box-shadow:0 8px 22px rgba(150,110,70,.06);margin-top:20px;">
      <div style="font-family:'Newsreader',serif;font-size:20px;color:#3A342C;margin-bottom:6px;">Privacy controls</div>
      <sc-for list="{{ controls }}" as="c" hint-placeholder-count="4">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #F2E9DA;">
          <div><div style="font-size:13.5px;font-weight:600;color:#3A342C;">{{ c.title }}</div><div style="font-size:12px;color:#8A7C6C;margin-top:2px;">{{ c.desc }}</div></div>
          <div style="width:44px;height:25px;border-radius:14px;background:{{ c.trackBg }};position:relative;flex-shrink:0;"><span style="position:absolute;top:3px;{{ c.knobSide }}:3px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2);"></span></div>
        </div>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const mkT = (title, desc, on) => ({ title, desc, trackBg: on ? '#BC7A45' : '#DBC9B0', knobSide: on ? 'right' : 'left' });
    return {
      stats: [
        { value: '7', label: 'Open data requests', color: '#BC7A45' },
        { value: '2.1d', label: 'Avg. resolution time', color: '#6E7459' },
        { value: '100%', label: 'Within 30-day SLA', color: '#6E7459' },
        { value: '0', label: 'Open breaches', color: '#3A342C' },
      ],
      dsar: [
        { type: 'Data export request', ref: 'DSR-2048', age: '2h ago', status: 'New', icon: 'refresh', bg: '#F2E6D6', color: '#BC7A45' },
        { type: 'Right to erasure', ref: 'DSR-2047', age: '1 day ago', status: 'In review', icon: 'clock', bg: '#F2E6D6', color: '#BC7A45' },
        { type: 'Data access request', ref: 'DSR-2045', age: '3 days ago', status: 'Complete', icon: 'check', bg: '#EAEBE1', color: '#6E7459' },
        { type: 'Rectification', ref: 'DSR-2043', age: '5 days ago', status: 'Complete', icon: 'check', bg: '#EAEBE1', color: '#6E7459' },
      ],
      retention: [
        { data: 'Message content', period: '24 months' },
        { data: 'Child profile data', period: 'Until removal' },
        { data: 'Location (approx.)', period: '12 months' },
        { data: 'Audit & security logs', period: '36 months' },
        { data: 'Deleted account data', period: '30 days' },
      ],
      controls: [
        mkT('Privacy-by-default discovery', 'New families are hidden from discovery until they opt in.', true),
        mkT('Minimum cohort threshold (k≥10)', 'Suppress any municipality report below 10 records.', true),
        mkT('No exact child birthdate in discovery', 'Only age bands are ever exposed.', true),
        mkT('Automated retention enforcement', 'Purge data past its retention window nightly.', true),
      ],
    };
  }
}
</script>
</body>
</html>
