<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;background:#F6F0E8;} a{color:#9E5A2C;} a:hover{color:#BC7A45;}</style>
</helmet>
<div style="font-family:'Hanken Grotesk',sans-serif;background:#F6F0E8;color:#463F37;min-height:100vh;">
  <dc-import name="AppHeader" active="events" hint-size="100%,64px"></dc-import>
  <div style="display:flex;max-width:1280px;margin:0 auto;align-items:flex-start;">
    <div style="width:230px;flex-shrink:0;"><dc-import name="DashboardSidebar" active="events" hint-size="230px,600px"></dc-import></div>
    <div style="flex:1;min-width:0;max-width:600px;padding:32px 40px 60px;">
      <div style="display:flex;gap:14px;">
        <div style="width:56px;height:56px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,#D79A62,#B26A38);display:flex;align-items:center;justify-content:center;"><dc-import name="Icon" icon-name="calendar" color="#fff" size="24" hint-size="24,24"></dc-import></div>
        <div>
          <div style="font-family:'Newsreader',serif;font-size:21px;color:#3A342C;">Kids Yoga Workshop</div>
          <div style="font-size:12px;color:#8A7C6C;display:flex;align-items:center;gap:5px;margin-top:2px;"><dc-import name="Icon" icon-name="clock" color="#A99B89" size="11" hint-size="11,11"></dc-import>Sat, Jun 7, 2026 · 10:00–11:30</div>
          <div style="font-size:12px;color:#8A7C6C;display:flex;align-items:center;gap:5px;margin-top:1px;"><dc-import name="Icon" icon-name="pin" color="#A99B89" size="11" hint-size="11,11"></dc-import>Grünerløkka Community Center, Oslo</div>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:22px;">
        <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
          <div style="font-size:13px;padding:9px 16px;border-radius:20px;background:{{ t.bg }};color:{{ t.color }};font-weight:{{ t.weight }};border:1px solid {{ t.border }};cursor:pointer;">{{ t.label }}</div>
        </sc-for>
      </div>

      <div style="font-family:'Newsreader',serif;font-size:18px;color:#3A342C;margin-top:22px;">Key metrics</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;">
        <sc-for list="{{ metrics }}" as="m" hint-placeholder-count="4">
          <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:14px;box-shadow:0 6px 16px rgba(150,110,70,.05);">
            <div style="font-family:'Newsreader',serif;font-size:19px;color:#3A342C;">{{ m.value }}</div>
            <div style="font-size:10px;color:#8A7C6C;margin-top:2px;">{{ m.label }}</div>
            <sc-if value="{{ m.delta }}" hint-placeholder-val="{{ false }}"><div style="font-size:10px;color:#6E7459;margin-top:3px;font-weight:600;">↑ {{ m.delta }}</div></sc-if>
          </div>
        </sc-for>
      </div>

      <div style="font-family:'Newsreader',serif;font-size:18px;color:#3A342C;margin-top:24px;">Registrations over time</div>
      <div style="background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:16px;margin-top:10px;box-shadow:0 6px 16px rgba(150,110,70,.05);">
        <svg viewBox="0 0 300 80" style="width:100%;height:90px;"><polyline points="0,60 40,55 80,40 120,45 160,30 200,25 240,18 300,8" fill="none" stroke="#BC7A45" stroke-width="2.5" stroke-linecap="round"></polyline></svg>
      </div>

      <div style="font-family:'Newsreader',serif;font-size:18px;color:#3A342C;margin-top:22px;">Ticket breakdown</div>
      <div style="display:flex;align-items:center;gap:26px;margin-top:14px;background:#fff;border:1px solid #EFE4D4;border-radius:14px;padding:18px;box-shadow:0 6px 16px rgba(150,110,70,.05);">
        <div style="width:110px;height:110px;border-radius:50%;background:conic-gradient(#BC7A45 0% 42.9%, #6E7459 42.9% 81%, #9BA184 81% 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <div style="width:64px;height:64px;border-radius:50%;background:#F6F0E8;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <div style="font-family:'Newsreader',serif;font-size:17px;color:#3A342C;">42</div><div style="font-size:9px;color:#8A7C6C;">Total</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;font-size:12.5px;">
          <sc-for list="{{ breakdown }}" as="b" hint-placeholder-count="3">
            <div style="display:flex;align-items:center;gap:9px;color:#463F37;"><span style="width:10px;height:10px;border-radius:50%;background:{{ b.color }};flex-shrink:0;"></span>{{ b.label }}</div>
          </sc-for>
        </div>
      </div>
    </div>
  </div>
  <dc-import name="SiteFooter" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const tabDefs = ['Overview', 'Registrations', 'Check-ins', 'Analytics'];
    const tabs = tabDefs.map((label, i) => ({ label, bg: i === 3 ? '#3A342C' : '#fff', color: i === 3 ? '#F6F0E8' : '#463F37', border: i === 3 ? '#3A342C' : '#DBC9B0', weight: i === 3 ? 600 : 500 }));
    return {
      tabs,
      metrics: [
        { value: '42', label: 'Total registrations', delta: '12%' },
        { value: '28', label: 'Checked in', delta: '8%' },
        { value: '66.7%', label: 'Check-in rate', delta: '5%' },
        { value: '3', label: 'Days to event', delta: '' },
      ],
      breakdown: [
        { label: 'Child (2–12 years) · 18 (42.9%)', color: '#BC7A45' },
        { label: 'Adult (13+ years) · 16 (38.1%)', color: '#6E7459' },
        { label: 'Family (2A+2K) · 8 (19.0%)', color: '#9BA184' },
      ],
    };
  }
}
</script>
</body>
</html>
